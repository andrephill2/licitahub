        // ==========================================
        // Utils: Formatação, Componentes Textuais e Regras
        // ==========================================
        
        const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const removeAccents = (str) => {
            if (!str) return '';
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        };

        const formatDate = (isoString) => {
            if (!isoString) return 'Não informada';
            try {
                const date = new Date(isoString);
                if (isNaN(date.getTime())) return 'Inválida';
                return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
            } catch { return 'Inválida'; }
        };

        const formatDateTime = (isoString) => {
            if (!isoString) return 'Não informada';
            try {
                const date = new Date(isoString);
                if (isNaN(date.getTime())) return 'Inválida';
                const formatted = date.toLocaleString('pt-BR', { 
                    timeZone: 'America/Sao_Paulo', 
                    day: '2-digit', month: '2-digit', year: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
                return `${formatted}`;
            } catch { return 'Inválida'; }
        };

        const getStatusColor = (status) => {
            if (!status) return 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300 border border-slate-200 dark:border-slate-700';
            const s = status.toLowerCase();
            if (s.includes('recebendo') || s.includes('aberta') || s.includes('vigente')) return 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 border border-green-200 dark:border-green-800';
            if (s.includes('homologad') || s.includes('encerrad') || s.includes('concluíd')) return 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300 border border-slate-200 dark:border-slate-700';
            if (s.includes('suspen') || s.includes('cancelad') || s.includes('revogad')) return 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 border border-red-200 dark:border-red-800';
            return 'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400 border border-blue-100 dark:border-blue-800';
        };

        // Highlight Inteligente
        const HighlightedText = ({ text, highlight, matchType }) => {
            if (!highlight || !text) return <span>{text}</span>;
            try {
                let regex;
                if (matchType === 'exact') {
                    regex = new RegExp(`(${escapeRegExp(highlight.trim())})`, 'gi');
                } else {
                    const words = highlight.trim().split(/\s+/).filter(Boolean);
                    const accentMap = {
                        'a': '[aáàãâäAÁÀÃÂÄ]', 'e': '[eéèêëEÉÈÊË]', 'i': '[iíìîïIÍÌÎÏ]',
                        'o': '[oóòõôöOÓÒÕÔÖ]', 'u': '[uúùûüUÚÙÛÜ]', 'c': '[cçCÇ]'
                    };
                    const regexParts = words.map(w => {
                        return w.split('').map(char => accentMap[char.toLowerCase()] || escapeRegExp(char)).join('');
                    });
                    regex = new RegExp(`(${regexParts.join('|')})`, 'gi');
                }
const parts = text.split(regex);
                // Regex limpo apenas para testar cada parte isoladamente, sem alterar o lastIndex global
                const testRegex = new RegExp(regex.source, 'i');
                return (
                    <span>
                        {parts.map((part, i) => 
                            testRegex.test(part) ? (
                                <mark key={i} className="bg-yellow-300/90 text-yellow-900 font-bold rounded-sm px-1 shadow-sm">
                                    {part}
                                </mark>
                            ) : (
                                <span key={i}>{part}</span>
                            )
                        )}
                    </span>
                );
            } catch (e) {
                return <span>{text}</span>;
            }
        };

        const ESTADOS_BR = [
            'AC', 'AL', 'AP', 'AM', 'BA', 'CE', 'DF', 'ES', 'GO', 'MA', 'MT', 'MS', 'MG', 
            'PA', 'PB', 'PR', 'PE', 'PI', 'RJ', 'RN', 'RS', 'RO', 'RR', 'SC', 'SP', 'SE', 'TO'
        ];
        const ESFERAS = ['Municipal', 'Estadual', 'Federal'];

        const getEsferaInfo = (nomeOrgao, esfera_nome) => {
            if (esfera_nome) return esfera_nome;
            const org = (nomeOrgao || '').toUpperCase();
            if (org.includes('PREFEITURA') || org.includes('MUNICÍPIO') || org.includes('MUNICIPIO') || org.includes('CÂMARA MUNICIPAL')) return 'Municipal';
            if (org.includes('ESTADO') || org.includes('TRIBUNAL DE JUSTIÇA') || org.includes('SECRETARIA DE ESTADO') || org.includes('POLÍCIA MILITAR')) return 'Estadual';
            if (org.includes('FEDERAL') || org.includes('MINISTÉRIO') || org.includes('UNIÃO') || org.includes('INSTITUTO FEDERAL')) return 'Federal';
            return 'Não informada';
        };

        const getCapagNote = (nomeOrgao) => {
            if (!nomeOrgao) return null;
            const upper = nomeOrgao.toUpperCase();
            if (upper.includes('PREFEITURA') || upper.includes('MUNICÍPIO') || upper.includes('MUNICIPIO')) {
                let hash = 0;
                for (let i = 0; i < upper.length; i++) hash += upper.charCodeAt(i);
                const scores = ['A', 'B', 'C', 'D'];
                return scores[hash % 4]; 
            }
            return null;
        };

        const getCapagColor = (note) => {
            switch(note) {
                case 'A': return 'bg-green-100 text-green-700 border-green-300 dark:bg-green-900/40 dark:text-green-400 dark:border-green-700';
                case 'B': return 'bg-blue-100 text-blue-700 border-blue-300 dark:bg-blue-900/40 dark:text-blue-400 dark:border-blue-700';
                case 'C': return 'bg-yellow-100 text-yellow-700 border-yellow-300 dark:bg-yellow-900/40 dark:text-yellow-400 dark:border-yellow-700';
                case 'D': return 'bg-red-100 text-red-700 border-red-300 dark:bg-red-900/40 dark:text-red-400 dark:border-red-700';
                default: return 'bg-slate-100 text-slate-700 border-slate-300';
            }
        };

        const extractPortalName = (item, defaultFallback = 'PNCP') => {
            let sys = item.usuario_nome || item.usuarioNome || item.nome_sistema || item.nomeSistema || '';
            const link = item.linkSistemaOrigem || item.item_url || '';
            
            if (!sys && link) {
                if (link.includes('compras.gov.br') || link.includes('comprasnet')) sys = 'Compras.gov.br';
                else if (link.includes('licitacoes-e')) sys = 'Licitações-e (BB)';
                else if (link.includes('portaldecompraspublicas')) sys = 'Portal de Compras Públicas';
                else if (link.includes('bec.sp.gov.br')) sys = 'BEC/SP';
                else if (link.includes('bll.org.br') || link.includes('bllcompras')) sys = 'BLL Compras';
                else if (link.includes('transparencia')) sys = 'Portal de Transparência';
            }
            
            sys = sys || item.fonte || defaultFallback;
            
            if (sys.toUpperCase().includes('COMPRASNET') || sys.toUpperCase().includes('COMPRAS.GOV')) return 'Compras.gov.br';
            if (sys.toUpperCase().includes('PORTAL DE COMPRAS PÚBLICAS')) return 'Portal de Compras Públicas';
            
            return sys;
        };

        // ==========================================
        // 2. SISTEMA DE TOASTS
        // ==========================================
        let countId = 0;
        const genId = () => (countId = (countId + 1) % Number.MAX_SAFE_INTEGER).toString();
        const toastTimeouts = new Map();

        const addToRemoveQueue = (toastId, dispatch) => {
            if (toastTimeouts.has(toastId)) return;
            const timeout = setTimeout(() => {
                toastTimeouts.delete(toastId);
                dispatch({ type: "REMOVE_TOAST", toastId });
            }, 5000);
            toastTimeouts.set(toastId, timeout);
        };

        const reducer = (state, action, dispatch) => {
            switch (action.type) {
                case "ADD_TOAST": return { ...state, toasts: [action.toast, ...state.toasts].slice(0, 5) };
                case "DISMISS_TOAST":
                    if (action.toastId) addToRemoveQueue(action.toastId, dispatch);
                    else state.toasts.forEach((t) => addToRemoveQueue(t.id, dispatch));
                    return { ...state, toasts: state.toasts.map((t) => t.id === action.toastId || !action.toastId ? { ...t, open: false } : t) };
                case "REMOVE_TOAST": return { ...state, toasts: action.toastId ? state.toasts.filter((t) => t.id !== action.toastId) : [] };
                default: return state;
            }
        };

        let memoryState = { toasts: [] };
        const listeners = [];
        const dispatch = (action) => {
            memoryState = reducer(memoryState, action, dispatch);
            listeners.forEach((l) => l(memoryState));
        };

        const toast = (props) => {
            const id = genId();
            const dismiss = () => dispatch({ type: "DISMISS_TOAST", toastId: id });
            dispatch({ type: "ADD_TOAST", toast: { ...props, id, open: true } });
            return { id, dismiss };
        };

        const useToast = () => {
            const [state, setState] = useState(memoryState);
            useEffect(() => {
                listeners.push(setState);
                return () => { const i = listeners.indexOf(setState); if (i > -1) listeners.splice(i, 1); };
            }, []);
            return { ...state, toast, dismiss: (id) => dispatch({ type: "DISMISS_TOAST", toastId: id }) };
        };

        // ==========================================
        // 3. MOTOR DE BUSCA API RESTAURADO E BLINDADO
        // RESTAURADO COM BASE NA VERSÃO V3 QUE FUNCIONA 100%
        // ==========================================
        
        const fetchApiSecure = async (url) => {
            // Tenta comunicação direta primeiro
            try {
                const res = await fetch(url, { headers: { 'Accept': 'application/json' }});
                if (res.ok) return res;
            } catch(e) {}

            // Usa o Proxy Original que sempre funcionou (AllOrigins GET method)
            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const res = await fetch(proxyUrl);
                if (res.ok) {
                    const data = await res.json();
                    if (data.contents) {
                        return {
                            ok: true,
                            json: async () => JSON.parse(data.contents)
                        };
                    }
                }
            } catch(e) {}

            throw new Error("Falha na rede ou bloqueio de CORS.");
        };

        async function searchPNCPFallback(keyword, pagina, vigentes) {
            try {
                const today = new Date();
               const past = new Date(today); past.setMonth(past.getMonth() - 3);
                const fmt = (d) => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;

                // DEV: Array com TODAS as modalidades oficiais do PNCP (Concorrência, Pregão, Dispensa, Leilão, etc)
                const modalidades = [1, 2, 3, 4, 5, 6, 7, 8]; 
              const fetches = modalidades.map(async (mod) => {
                    try {
                        const url = `https://pncp.gov.br/api/consulta/v1/contratacoes/publicacao?dataInicial=${fmt(past)}&dataFinal=${fmt(today)}&codigoModalidadeContratacao=${mod}&pagina=${pagina}&tamanhoPagina=50`;
                        const resp = await fetchApiSecure(url);
                        if (!resp || !resp.ok) return [];
                        const json = await resp.json();
                        return (json.data || []);
                    } catch (erro) {
                        return []; // Se uma modalidade falhar, protege as outras!
                    }
                });

                const results = await Promise.all(fetches);
                const items = results.flat().map((item, i) => {
                    const sys = extractPortalName(item);

                    const num = item.numeroCompra || item.numeroControlePNCP?.split('-')[2]?.split('/')[0] || '';
                    const ano = item.anoCompra || item.numeroControlePNCP?.split('/')[1] || '';
                    const tituloBusca = num && ano ? `Edital nº ${String(num).padStart(3, '0')}/${ano}` : 'Edital / Contratação';
                    const idContratacao = item.numero_controle_pncp || item.numeroControlePNCP || '';
                    
                    const fallbackId = item.orgaoEntidade?.cnpj ? `${item.orgaoEntidade.cnpj}-${ano}-${num}` : i;

                    return {
                        id: `pncp-${idContratacao || fallbackId}`,
                        tituloBusca: tituloBusca,
                        idContratacaoPncp: idContratacao,
                        objetoCompra: item.objetoCompra || 'Sem título',
                        orgaoEntidade: { razaoSocial: item.orgaoEntidade?.razaoSocial || '' },
                        dataPublicacao: formatDate(item.dataPublicacaoPncp),
                        dataIncioRecebimento: formatDateTime(item.dataAberturaProposta || item.dataInicioVigencia),
                        dataFimRecebimento: formatDateTime(item.dataEncerramentoProposta || item.dataFimVigencia),
                        rawDate: item.dataAberturaProposta || item.dataInicioVigencia || item.dataPublicacaoPncp || '1970-01-01',
                        rawPublicacaoDate: item.dataPublicacaoPncp || '1970-01-01',
                        modalidadeNome: item.modalidadeNome || 'Pregão',
                        situacao: item.situacaoCompraNome || 'Publicado',
                        valorTotalEstimado: item.valorTotalEstimado || 0,
                        fonte: 'PNCP',
                        sistema: sys,
                        linkSistemaOrigem: item.linkSistemaOrigem || (item.orgaoEntidade?.cnpj && item.anoCompra && item.sequencialCompra
                            ? `https://pncp.gov.br/app/editais/${item.orgaoEntidade.cnpj}/${item.anoCompra}/${item.sequencialCompra}` : ''),
                        uf: item.unidadeOrgao?.ufSigla || item.uf || '',
                        esfera: getEsferaInfo(item.orgaoEntidade?.razaoSocial, item.esferaNome)
                    };
                });
                return { items, total: items.length };
            } catch (e) { return { items: [], total: 0 }; }
        }

       async function searchPNCP(keyword, pagina, vigentes, searchType = 'edital') {
            try {
                const tipoDoc = searchType === 'ata' ? 'ata' : 'edital';
                const params = new URLSearchParams({ q: keyword, tipos_documento: tipoDoc, pagina: String(pagina), tam_pagina: '50' });
                // Atas não costumam ter status 'recebendo_proposta', então protegemos o filtro:
                if (vigentes && searchType !== 'ata') params.set('status', 'recebendo_proposta');
                const url = `https://pncp.gov.br/api/search/?${params}`;
                
                const resp = await fetchApiSecure(url);
                if (!resp || !resp.ok) throw new Error('PNCP falhou');
                
                const json = await resp.json();
                const items = (json.items || []).map(item => {
                    const cnpj = item.orgao_cnpj || item.cnpj || '';
                    const ano = item.ano || item.ano_compra || '';
                    const seq = item.numero_sequencial || item.sequencial_compra || '';
                    let link = (cnpj && ano && seq) ? `https://pncp.gov.br/app/editais/${cnpj}/${ano}/${seq}` : '';
                    
                    const sys = extractPortalName({ ...item, linkSistemaOrigem: link });

                    const uf = item.unidade_orgao?.uf || item.unidade_orgao_uf || item.uf_sigla || item.uf || '';
                    const esfera = getEsferaInfo(item.orgao_nome, item.esfera_nome);

                    const numC = item.numero_compra || item.numero_sequencial || '';
                   const anoC = item.ano_compra || item.ano || '';
                    const tituloBusca = numC && anoC ? `${searchType === 'ata' ? 'Ata SRP' : 'Edital'} nº ${String(numC).padStart(3, '0')}/${anoC}` : `${searchType === 'ata' ? 'Ata de Registro de Preço' : 'Edital / Contratação'}`;
                    const idContratacao = item.numero_controle_pncp || item.numeroControlePNCP || '';

                    return {
                        id: `pncp-${idContratacao || cnpj + '-' + ano + '-' + seq}`,
                        tituloBusca: tituloBusca,
                        idContratacaoPncp: idContratacao,
                        objetoCompra: item.description || item.title || 'Sem título',
                        orgaoEntidade: { razaoSocial: item.orgao_nome || '' },
                        dataPublicacao: formatDate(item.data_publicacao_pncp),
                        dataIncioRecebimento: formatDateTime(item.data_inicio_vigencia || item.data_abertura_proposta),
                        dataFimRecebimento: formatDateTime(item.data_fim_vigencia || item.data_encerramento_proposta),
                        rawDate: item.data_inicio_vigencia || item.data_publicacao_pncp || '1970-01-01',
                        rawPublicacaoDate: item.data_publicacao_pncp || '1970-01-01',
                        modalidadeNome: item.modalidade_licitacao_nome || 'Pregão',
                        situacao: item.situacao_nome || (vigentes ? 'Recebendo Proposta' : 'Publicado'),
                        valorTotalEstimado: item.valor_global || 0,
                        linkSistemaOrigem: link,
                        fonte: 'PNCP',
                        sistema: sys,
                        uf: uf,
                        esfera: esfera
                    };
                });
                return { items, total: json.count || items.length };
            } catch (e) {
                return await searchPNCPFallback(keyword, pagina, vigentes);
            }
        }

        async function searchComprasGov(keyword, vigentes) {
            try {

       const runFullSearchAndFilter = async (keyword, pagina, filters, archivedDict = {}) => {
            let apiKeyword = keyword;
            if (filters.matchType !== 'exact') {
                apiKeyword = keyword.trim().split(/\s+/)[0];
            }

          const promises = [
                searchPNCP(apiKeyword, pagina, filters.vigentes, filters.searchType)
            ];
            
            // O ComprasGov Legado não possui API limpa para Atas, então só acionamos se for modo Edital
            if (filters.searchType !== 'ata') {
                promises.push(searchComprasGov(apiKeyword, filters.vigentes));
            }
            
            const results = await Promise.allSettled(promises);
            let allItems = [];
            
            // Abordagem original (segura): junta tudo o que der sucesso, ignora falhas parciais
            results.forEach(res => {
                if (res.status === 'fulfilled' && res.value) {
                    if (Array.isArray(res.value)) allItems.push(...res.value);
                    else if (res.value.items) allItems.push(...res.value.items);
                }
            });

            // Se as duas falharem retornando array vazio, lançamos o erro para a UI
            if (allItems.length === 0 && results.every(r => r.status === 'rejected')) {
                throw new Error("Falha ao buscar dados oficiais. Todas as conexões falharam.");
            }

            const seenIds = new Set();

            const searchKwNoAccents = removeAccents(keyword.toLowerCase()).split(/\s+/).filter(Boolean);
            const regexExact = new RegExp('\\b' + escapeRegExp(keyword) + '\\b', 'i');

            allItems = allItems.filter(item => {
                // BLOQUEIO ABSOLUTO DO ARQUIVO
                if (archivedDict[item.id]) return false;
                
                if (seenIds.has(item.id)) return false;
                seenIds.add(item.id);

                const text = `${item.objetoCompra} ${item.orgaoEntidade?.razaoSocial}`;
                
                if (filters.matchType === 'exact') {
                    if (!regexExact.test(text)) return false;
                } else {
                    const textNormalized = removeAccents(text.toLowerCase());
                    if (!searchKwNoAccents.every(w => textNormalized.includes(w))) return false;
                }

                if (filters.uf && filters.uf.length > 0) {
                    if (!filters.uf.includes(item.uf)) return false;
                }
                
                if (filters.esfera && Array.isArray(filters.esfera) && filters.esfera.length > 0) {
                    if (!filters.esfera.includes(item.esfera)) return false;
                }

             if (filters.negative) {
                    const negWords = removeAccents(filters.negative.toLowerCase()).split(',').map(w => w.trim()).filter(Boolean);
                    const searchStr = removeAccents(text.toLowerCase());
                    if (negWords.some(nw => searchStr.includes(nw))) return false;
                }

                if (filters.orgao) {
                    const orgWord = removeAccents(filters.orgao.toLowerCase()).trim();
                    const orgaoText = removeAccents((item.orgaoEntidade?.razaoSocial || '').toLowerCase());
                    if (!orgaoText.includes(orgWord)) return false;
                }
                return true;
            });

            if (filters.dateStart || filters.dateEnd) {
                const tsIni = filters.dateStart ? new Date(`${filters.dateStart}T00:00:00`).getTime() : 0;
                const tsFim = filters.dateEnd ? new Date(`${filters.dateEnd}T23:59:59`).getTime() : Infinity;
                
                allItems = allItems.filter(item => {
                    const itemTs = new Date(item.rawPublicacaoDate).getTime();
                    if (isNaN(itemTs)) return true; 
                    return itemTs >= tsIni && itemTs <= tsFim;
                });
            }

            allItems.sort((a, b) => new Date(b.rawDate).getTime() - new Date(a.rawDate).getTime());

            return { items: allItems, total: allItems.length };
        };

                            // Só guarda no baú se for um card completo (objeto)
                            if (typeof parsed[key] === 'object' && parsed[key] !== null) {
                                dadosReais[key] = parsed[key];
                            }
                        }
                    }
                    return dadosReais;
                } catch (erro) { return {}; }
            });

            const [showSettings, setShowSettings] = useState(false);
            const [selectedItems, setSelectedItems] = useState(new Set());

         const [notifications, setNotifications] = useState([]);
            const [showNotifications, setShowNotifications] = useState(false);
            const [showIrpModal, setShowIrpModal] = useState(false);
            
            // NOVOS CONTROLES DO SMART HUB IRP
            const [isIrpFullscreen, setIsIrpFullscreen] = useState(false);
            const [irpUrl, setIrpUrl] = useState('https://www2.comprasnet.gov.br/siasgnet-atasrp/public/pesquisarFornecimento.do?method=iniciar');
            const [irpNotes, setIrpNotes] = useState(() => localStorage.getItem('licitahub-irp-notes') || '');
            
            useEffect(() => {
                localStorage.setItem('licitahub-irp-notes', irpNotes);

            // FIM DOS NOVOS CONTROLES

            const { toast } = useToast();

            const [isRadarActive, setIsRadarActive] = useState(false);
            const [radarIntervalMin, setRadarIntervalMin] = useState(5); 
            const tabsRef = useRef(tabs);
const archivedRef = useRef(archived);
const favoritesRef = useRef(favorites);

            useEffect(() => { setSelectedItems(new Set()); }, [activeTab]);

            useEffect(() => {
                localStorage.setItem('licitahub-tabs', JSON.stringify(tabs));
                tabsRef.current = tabs; 
            }, [tabs]);

            useEffect(() => { 
    localStorage.setItem('licitahub-favorites', JSON.stringify(favorites)); 
    favoritesRef.current = favorites;
}, [favorites]);

            useEffect(() => {
                localStorage.setItem('licitahub-archived', JSON.stringify(archived));
                archivedRef.current = archived; 
            }, [archived]);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1920; 
                        const MAX_HEIGHT = 1080;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        } else {
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        
                        try {
                            localStorage.setItem('licitahub-bg', JSON.stringify({...bgConfig, url: dataUrl}));
                            setBgConfig({...bgConfig, url: dataUrl});
                            toast({ title: 'Imagem Salva', description: 'O plano de fundo foi atualizado com sucesso.', variant: 'success' });
                        } catch (err) {
                            toast({ title: 'Erro', description: 'A imagem continua a ser muito pesada para o navegador.', variant: 'destructive' });
                        }
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

        // DEV: Motor global criado fora da função para o navegador não bloquear!
          window.globalAudioCtx = window.globalAudioCtx || new (window.AudioContext || window.webkitAudioContext)();

          const playAlertSound = () => {
                try {
                    if (window.globalAudioCtx.state === 'suspended') window.globalAudioCtx.resume();
                    
                    const osc = window.globalAudioCtx.createOscillator();
                    const gainNode = window.globalAudioCtx.createGain();
                    
                    osc.connect(gainNode);
                    gainNode.connect(window.globalAudioCtx.destination);
                    
                    osc.type = 'sine'; 
                    osc.frequency.setValueAtTime(880, window.globalAudioCtx.currentTime); 
                    
                    gainNode.gain.setValueAtTime(0, window.globalAudioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0.5, window.globalAudioCtx.currentTime + 0.1);
                    gainNode.gain.linearRampToValueAtTime(0, window.globalAudioCtx.currentTime + 0.5);
                    
                    osc.start(window.globalAudioCtx.currentTime);
                    osc.stop(window.globalAudioCtx.currentTime + 0.5);
                } catch (e) { console.warn("Erro no áudio sintético:", e); }
            };
            const checkForUpdates = async (isManual = false) => {
                const currentTabs = tabsRef.current;
                if (currentTabs.length === 0) {
                    if (isManual) toast({ title: 'Aviso', description: 'Não há pesquisas ativas para atualizar.', variant: 'info' });
                    return;

                if (isManual) toast({ title: 'Buscando atualizações...', description: 'Verificando todas as pesquisas abertas...', variant: 'info' });

                let totalNovos = 0;

                for (let tab of currentTabs) {
                    try {
                        const data = await runFullSearchAndFilter(tab.keyword, 1, tab.filters, archivedRef.current);
                        
                        setTabs(prevTabs => {
                            const targetTab = prevTabs.find(t => t.keyword === tab.keyword);
                            if (!targetTab) return prevTabs;

                            const existingIds = new Set(targetTab.items.map(i => i.id));
                            const newItems = data.items.filter(i => !existingIds.has(i.id) && !archivedRef.current[i.id] && !favoritesRef.current[i.id]);

                            if (newItems.length > 0) {
                                totalNovos += newItems.length;
                                
                                // O Toque Mágico: Dispara o alerta sonoro!
                                if (!isManual) playAlertSound();

                                        id: Date.now().toString() + Math.random(),

                                        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                                    },
                                    ...prev
                                ]);

                                        title: '🎯 Radar: Nova Licitação!', 
                                        description: `Encontramos ${newItems.length} edital(is) novo(s) para "${tab.keyword}".`, 
                                        variant: 'success' 
                                    });
                                }

                                const taggedNewItems = newItems.map(i => ({...i, isNewFromRadar: true}));
                                const existingItemsCleared = targetTab.items.map(i => ({...i, isNewFromRadar: false}));

                                return prevTabs.map(t => t.keyword === tab.keyword ? { 
                                    ...t, 
                                    items: [...taggedNewItems, ...existingItemsCleared], 
                                    total: t.total + newItems.length 
                                } : t);
                            }
                            return prevTabs;
                        });

                        console.error(`Falha na atualização da aba ${tab.keyword}`);
                    }

                    }

            useEffect(() => {

            const isArchivedView = activeTab === 'ARQUIVADOS';

                    const orgWord = removeAccents(filterOrgao.toLowerCase()).trim();
                    items = items.filter(i => removeAccents((i.orgaoEntidade?.razaoSocial || '').toLowerCase()).includes(orgWord));
                }

               // Busca local exclusiva dentro da aba de Arquivados

                    const searchWord = removeAccents(localSearch.toLowerCase()).trim();
                    items = items.filter(i => 
                        removeAccents((i.objetoCompra || '').toLowerCase()).includes(searchWord) ||

                        removeAccents((i.tituloBusca || '').toLowerCase()).includes(searchWord)

            const uniqueStatuses = useMemo(() => ['Todas', ...new Set(displayedItems.map(i => i.situacao).filter(Boolean))].sort(), [displayedItems]);
            
          const doSearch = async () => {
                const currentFilters = { 
                    matchType: filterMatchType, vigentes: filterVigentes, uf: filterUf,
                    esfera: filterEsfera, negative: filterNegative, orgao: filterOrgao, dateStart: filterDateStart, dateEnd: filterDateEnd,
                    searchType: searchType 
                };
                let kw = keywordInput.trim();
                
                // Proteção para não re-pesquisar abas internas de sistema
                if (!kw && activeTab && activeTab !== 'FAVORITOS' && activeTab !== 'ARQUIVADOS') kw = activeTab;

                // NOVA REGRA: Exige Palavra-chave OU Órgão
                if (!kw && !filterOrgao) {
                    toast({ title: 'Aviso', description: 'Insira uma palavra-chave ou o nome do Órgão nos filtros.', variant: 'info' });
                    return;
                }

                // TRUQUE DISRUPTIVO: Se não tem palavra-chave, usamos o nome do órgão para enganar a API e puxar os dados!
                const tabKey = kw ? kw.toLowerCase() : `Órgão: ${filterOrgao}`;
                const apiSearchTerm = kw ? kw.toLowerCase() : filterOrgao;

                setKeywordInput('');
                setActiveTab(tabKey);
                setModalityFilter('Todas');
                setStatusFilter('Todas');

                setTabs(prev => {
                    const exists = prev.find(t => t.keyword === tabKey);
                    if (exists) return prev.map(t => t.keyword === tabKey ? { ...t, loading: true, filters: currentFilters } : t);
                    return [...prev, { keyword: tabKey, filters: currentFilters, items: [], total: 0, loading: true }];
                });

                try {
                    // Aqui a mágica acontece: mandamos 'apiSearchTerm' para o Governo
                    const data = await runFullSearchAndFilter(apiSearchTerm, 1, currentFilters, archivedRef.current);
                    const validItems = data.items;

                    setTabs(prev => prev.map(t => t.keyword === tabKey ? { ...t, items: validItems, total: validItems.length, loading: false } : t));
                    
                  if (validItems.length === 0) {
                        toast({ title: 'Aviso', description: 'Nenhum resultado encontrado para os filtros selecionados.', variant: 'info' });
                    } else {
                        playAlertSound();
                        toast({ title: 'Pesquisa Concluída', description: `Encontrados ${validItems.length} resultados.`, variant: 'success' });
                    }
                } catch (err) {
                    toast({ title: 'Falha de Conexão', description: 'Não foi possível conectar aos portais do Governo.', variant: 'destructive' });
                    setTabs(prev => prev.map(t => t.keyword === tabKey ? { ...t, loading: false } : t));
                }
            };

          const closeTab = (kw, e) => {
                e.stopPropagation();
                
                // 1. Descobre como a lista vai ficar
                const newTabs = tabs.filter(t => t.keyword !== kw);
                
                // 2. Muda a aba ativa PRIMEIRO (de forma segura)
                if (activeTab === kw) {
                    if (Object.keys(favorites).length > 0) {
                        setActiveTab('FAVORITOS');
                    } else {
                        setActiveTab(newTabs.length > 0 ? newTabs[newTabs.length - 1].keyword : null);
                    }
                }
                
                // 3. Atualiza a lista de abas
                setTabs(newTabs);
            };

            const toggleSelect = (id) => {
                setSelectedItems(prev => {
                    const next = new Set(prev);
                    if (next.has(id)) next.delete(id);
                    else next.add(id);
                    return next;
                });
            };

            const allDisplayedSelected = displayedItems.length > 0 && displayedItems.every(i => selectedItems.has(i.id));

            const toggleSelectAll = () => {
                if (allDisplayedSelected) {
                    setSelectedItems(prev => {
                        const next = new Set(prev);
                        displayedItems.forEach(i => next.delete(i.id));
                        return next;
                    });
                } else {
                    setSelectedItems(prev => {
                        const next = new Set(prev);
                        displayedItems.forEach(i => next.add(i.id));
                        return next;
                    });
                }
            };

            const handleArchiveItem = (item) => {
                if (window.confirm("Deseja mesmo arquivar este edital? Ele não voltará a aparecer nas suas pesquisas.")) {
                    setArchived(prev => ({ ...prev, [item.id]: item }));
                    
                    setFavorites(prev => {
                        const newFavs = { ...prev };
                        delete newFavs[item.id];
                        return newFavs;
                    });

                    setTabs(prev => prev.map(t => ({
                        ...t,
                        items: t.items.filter(i => i.id !== item.id),
                        total: t.items.filter(i => i.id !== item.id).length
                    })));

                    toast({ title: 'Edital Arquivado', description: 'Edital removido e oculto com sucesso.', variant: 'success' });
                }
            };

            const handleArchiveSelected = () => {
                if (selectedItems.size === 0) return;
                
               if (window.confirm(`Tem a certeza que deseja arquivar definitivamente os ${selectedItems.size} editais selecionados?`)) {
                    const newArchived = { ...archived };
                    selectedItems.forEach(id => {
                        const targetItem = displayedItems.find(i => i.id === id);
                        if (targetItem) newArchived[id] = targetItem;
                    });
                    setArchived(newArchived);
                    setFavorites(prev => {
                        const newFavs = { ...prev };
                        selectedItems.forEach(id => delete newFavs[id]);
                        return newFavs;
                    });

                    setTabs(prev => prev.map(t => ({
                        ...t,
                        items: t.items.filter(i => !selectedItems.has(i.id)),
                        total: t.items.filter(i => !selectedItems.has(i.id)).length
                    })));

                    toast({ title: 'Limpeza Concluída', description: `${selectedItems.size} resultados foram arquivados definitivamente.`, variant: 'success' });
                    setSelectedItems(new Set());
                }
            };

            const handleFavorite = (item) => {
                const isFav = !!favorites[item.id];
                if (!isFav) {
                    setFavorites(prev => ({...prev, [item.id]: { ...item, keywordOrigin: activeTab === 'FAVORITOS' ? item.keywordOrigin : activeTab }}));
                    toast({ title: 'Adicionado aos Favoritos!', description: 'Você receberá alertas deste edital.', variant: 'success' });
                } else {
                    const newFavs = {...favorites};
                    delete newFavs[item.id];
                    setFavorites(newFavs);
                    toast({ title: 'Removido', description: 'Edital removido dos favoritos.' });
                    if (Object.keys(newFavs).length === 0 && activeTab === 'FAVORITOS') {
                        setActiveTab(tabs.length > 0 ? tabs[tabs.length - 1].keyword : null);
                    }
                }
            };

            // DEV DISRUPTIVO: Motor de Exportação para Excel (CSV) via Blob Seguro
            const exportToExcel = () => {
                if (displayedItems.length === 0) {
                    toast({ title: 'Aviso', description: 'Não há dados para exportar.', variant: 'info' });
                    return;
                }

                let csvRows = [];
                // Cabeçalho
                csvRows.push("Fonte;Modalidade;Situacao;Orgao;UF;Esfera;Data Publicacao;Data Recebimento;Objeto;Valor Estimado;Link");

                displayedItems.forEach(item => {
                    const escapeCsv = (str) => `"${String(str || '').replace(/"/g, '""').replace(/\n/g, ' ')}"`;
                    const row = [
                        escapeCsv(item.sistema), escapeCsv(item.modalidadeNome), escapeCsv(item.situacao),
                        escapeCsv(item.orgaoEntidade?.razaoSocial), escapeCsv(item.uf), escapeCsv(item.esfera),
                        escapeCsv(item.dataPublicacao), escapeCsv(item.dataIncioRecebimento), escapeCsv(item.objetoCompra),
                        escapeCsv(item.valorTotalEstimado), escapeCsv(item.linkSistemaOrigem)
                    ].join(";");
                    csvRows.push(row);
                });

                // Junta tudo com quebra de linha e insere o BOM (\uFEFF) para forçar o Excel a ler os acentos (UTF-8)
                const csvString = "\uFEFF" + csvRows.join("\n");
                
                // Cria um arquivo binário na memória (Blob), resolvendo o limite de caracteres e de tamanho!
                const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `Licitacoes_${(activeTab || 'Export').replace(/[^a-z0-9]/gi, '_')}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url); // Limpa a memória do navegador
                
                toast({ title: 'Excel Gerado', description: 'Sua planilha foi baixada com sucesso.', variant: 'success' });
            };
            return (
                <div className="flex-1 flex flex-col z-10">

                                <div className="h-10 w-10 rounded-xl bg-indigo-600 flex items-center justify-center shadow-lg"><Icon name="zap" className="h-5 w-5 text-white" /></div>
                               <div>
                                    <h1 className="text-xl font-bold leading-none tracking-tight">LicitaHub</h1>
                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1 flex items-center gap-1.5">
                                        Central de Licitações <span className="text-slate-300 dark:text-slate-600">|</span> 
                                        <span className="text-indigo-600 dark:text-indigo-400">
                                            Usuário: {currentUser?.username}
                                        </span>
                                        <span className="text-slate-300 dark:text-slate-600">|</span>
                                        {currentUser?.role === 'master' ? (
                                            <span className="text-emerald-600 dark:text-emerald-400 font-black">Acesso Master</span>

                                                {diasRestantes !== null ? `Validade: ${diasRestantes} dia(s)` : 'Sem licença'}
                                            </span>
                                        )}
                                    </p>
                                </div>
                            </div>
                            <div className="flex gap-2 items-center">
                                <div className="relative">
                                    <Button variant="ghost" className="!p-2.5 rounded-full relative bg-white/50 dark:bg-slate-800/50" onClick={() => setShowNotifications(!showNotifications)}>
                                        <Icon name="bell" className="h-5 w-5" />
                                        {notifications.some(n => n.unread) && <span className="absolute top-1 right-1.5 h-2.5 w-2.5 bg-red-500 border-2 border-white dark:border-slate-900 rounded-full animate-pulse"></span>}
                                    </Button>
                                    
                                    {showNotifications && (
                                        <div className="absolute right-0 mt-2 w-80 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-2xl p-4 z-50">
                                            <h3 className="font-bold mb-3 text-sm flex justify-between items-center">Avisos {notifications.some(n => n.unread) && <span className="text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full">Novos</span>}</h3>
                                            {notifications.length === 0 ? <p className="text-sm text-slate-500 text-center py-4">Nenhum aviso no momento.</p> : (
                                                <div className="space-y-2 max-h-64 overflow-y-auto pr-1">
                                                    {notifications.map(n => (
                                                        <div key={n.id} className={`p-3 rounded-xl text-sm cursor-pointer transition-colors ${n.unread ? 'bg-indigo-50 dark:bg-indigo-900/20 border border-indigo-100 dark:border-indigo-800/50' : 'bg-slate-50 dark:bg-slate-800/50 border border-transparent'}`} 
                                                        onClick={() => { setNotifications(prev => prev.map(x => x.id === n.id ? {...x, unread: false} : x)); if (n.itemLink) window.open(n.itemLink, '_blank'); }}>
                                                            <div className="flex justify-between items-start mb-1"><span className="font-bold text-[11px] text-indigo-600 dark:text-indigo-400 uppercase tracking-wider">Aviso de Retificação</span><span className="text-[10px] text-slate-400">{n.time}</span></div>
                                                            <p className="text-xs text-slate-600 dark:text-slate-300">{n.message}</p>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                                
                                <div className="relative">
                                    <Button variant="ghost" className="!p-2.5 rounded-full bg-white/50 dark:bg-slate-800/50" onClick={() => setShowSettings(!showSettings)} title="Personalizar Visual">
                                        <Icon name="settings" className="h-5 w-5" />
                                    </Button>
                                    {showSettings && (
                                        <div className="absolute right-0 mt-2 w-80 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-2xl p-5 z-50">
                                            <h3 className="font-bold text-sm mb-4">Personalização do Painel</h3>
                                            <div className="space-y-5">

                                                        type="file" 
                                                        accept="image/jpeg, image/png" 
                                                        onChange={handleImageUpload} 
                                                        className="w-full text-xs text-slate-500 dark:text-slate-400 file:mr-3 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-indigo-50 file:text-indigo-700 dark:file:bg-indigo-900/30 dark:file:text-indigo-400 hover:file:bg-indigo-100 dark:hover:file:bg-indigo-900/50 cursor-pointer" 
                                                    />
                                                    {bgConfig.url && (
                                                        <button 
                                                            onClick={() => setBgConfig({...bgConfig, url: ''})} 
                                                            className="mt-3 text-[10px] bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 font-bold px-3 py-1.5 rounded-lg hover:bg-red-100 transition-colors w-full text-center"
                                                        >
                                                            Remover Imagem Atual
                                                        </button>
                                                    )}
                                                </div>
                                                <div className="pt-2 border-t border-slate-100 dark:border-slate-800">
                                                    <div className="flex justify-between items-center mb-2">
                                                        <label className="block text-[10px] font-bold uppercase tracking-widest text-slate-500">Opacidade do Fundo</label>

                                            </div>
                                            {/* Botão fechar (visível só no mobile) */}
                                            <button onClick={() => setShowIrpModal(false)} className="sm:hidden p-1.5 text-slate-400 hover:text-red-500 rounded-lg bg-slate-100 dark:bg-slate-800">
                                                <Icon name="x" className="w-4 h-4" />
                                            </button>
                                        </div>

                                        <div className="p-3 flex flex-col gap-2 overflow-y-auto">
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-1">Sistemas Oficiais</span>
                                            
                                            {/* BOTÃO 1: ATAS SIASG (Roda no Iframe) */}
                                            <button onClick={() => setIrpUrl('https://www2.comprasnet.gov.br/siasgnet-atasrp/public/pesquisarFornecimento.do?method=iniciar')} 
                                                className={`text-left text-xs font-bold p-3 rounded-xl transition-all flex items-center gap-2 ${irpUrl.includes('atasrp') ? 'bg-indigo-600 text-white shadow-md' : 'hover:bg-slate-200 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300'}`}>
                                                <Icon name="search" className="w-4 h-4 shrink-0" /> Pesquisar Atas (SRP)
                                            </button>
                                            
                                            {/* BOTÃO 2: IRP SIASG (Roda no Iframe) */}
                                            <button onClick={() => setIrpUrl('https://www2.comprasnet.gov.br/siasgnet-irp/consultarIRPComprasNet.do?method=iniciar')} 
                                                className={`text-left text-xs font-bold p-3 rounded-xl transition-all flex items-center gap-2 ${irpUrl.includes('consultarIRPComprasNet') ? 'bg-indigo-600 text-white shadow-md' : 'hover:bg-slate-200 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300'}`}>
                                                <Icon name="target" className="w-4 h-4 shrink-0" /> Consultar IRPs
                                            </button>
                                            
                                            {/* BOTÃO 3: PNCP (Abre em Nova Aba devido a bloqueio do Governo) */}
                                            <button onClick={() => window.open('https://pncp.gov.br/app/atas', '_blank')} 
                                                className="text-left text-xs font-bold p-3 rounded-xl transition-all flex items-center gap-2 hover:bg-slate-200 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300" title="Abre externamente">
                                                <Icon name="check" className="w-4 h-4 shrink-0" /> Painel de Atas (PNCP)
                                                <Icon name="login" className="w-3 h-3 ml-auto opacity-50" />
                                            </button>

                                            <div className="mt-4 border-t border-slate-200 dark:border-slate-800 pt-4 flex flex-col flex-1">
                                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 flex items-center gap-1">
                                                    <Icon name="save" className="w-3 h-3" /> Bloco de Notas Tático
                                                </span>
                                                <textarea 
                                                    value={irpNotes}
                                                    onChange={(e) => setIrpNotes(e.target.value)}
                                                    placeholder="Cole aqui CNPJs, UASGs ou Códigos de Itens para usar no sistema ao lado..."
                                                    className="w-full flex-1 min-h-[150px] sm:min-h-0 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-xs text-slate-600 dark:text-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none resize-none shadow-inner custom-scrollbar"
                                                ></textarea>
                                                <p className="text-[9px] text-slate-400 text-center mt-2">Salva automaticamente no seu PC.</p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* ÁREA DO NAVEGADOR (IFRAME) */}
                                    <div className="flex-1 flex flex-col relative bg-slate-200 dark:bg-slate-800">
                                        
                                        {/* Barra de Ferramentas Superior */}
                                        <div className="h-12 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-3">
                                            <div className="flex items-center gap-2 text-[10px] sm:text-xs text-slate-500 font-medium truncate max-w-[50%] sm:max-w-none bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-700">
                                                <Icon name="shield" className="w-3 h-3 text-green-500 shrink-0" />
                                                <span className="truncate">{irpUrl}</span>
                                            </div>

                                            <div className="flex items-center gap-1 sm:gap-2 shrink-0">
                                                <a href={irpUrl} target="_blank" className="text-[10px] font-bold bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-2 sm:px-3 py-1.5 rounded-lg hover:bg-blue-100 transition-colors flex items-center gap-1" title="Forçar abertura em nova aba caso o Governo bloqueie a tela">
                                                    <Icon name="login" className="w-3 h-3" /> <span className="hidden sm:inline">Abrir Externo</span>
                                                </a>
                                                
                                                <button onClick={() => setIsIrpFullscreen(!isIrpFullscreen)} className="p-1.5 sm:px-3 sm:py-1.5 text-[10px] font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors rounded-lg flex items-center gap-1 border border-transparent hover:border-slate-200 dark:hover:border-slate-700">
                                                    <Icon name="dashboard" className="w-3.5 h-3.5" /> <span className="hidden sm:inline">{isIrpFullscreen ? 'Restaurar Tela' : 'Tela Cheia'}</span>
                                                </button>

                                                <button onClick={() => setShowIrpModal(false)} className="hidden sm:flex p-1.5 sm:px-3 sm:py-1.5 text-[10px] font-bold text-white bg-red-500 hover:bg-red-600 transition-colors rounded-lg items-center gap-1 shadow-sm ml-2">
                                                    <Icon name="x" className="w-3.5 h-3.5" /> Fechar
                                                </button>
                                            </div>
                                        </div>

                                        {/* O Iframe */}
                                        <div className="flex-1 relative w-full h-full bg-white">
                                            <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-400 pointer-events-none z-0 bg-slate-50 dark:bg-slate-900">
                                                <Icon name="refresh" className="w-8 h-8 animate-spin mb-3 text-slate-300" />
                                                <span className="text-sm font-bold text-slate-500">Conectando ao banco de dados federal...</span>
                                                <span className="text-xs max-w-sm text-center mt-2 opacity-70">Se esta tela continuar cinza/branca, o servidor do governo bloqueou a visualização embutida. Clique em "Abrir Externo" lá em cima.</span>
                                            </div>
                                            
                                            <iframe 
                                                key={irpUrl}
                                                src={irpUrl} 
                                                className="relative z-10 w-full h-full border-0 bg-white"
                                                title="Navegador Interno"
                                                sandbox="allow-same-origin allow-scripts allow-forms allow-popups"
                                            ></iframe>
                                        </div>

                                    </div>
                                </div>
                            </div>
                        )}
                        {/* FIM DO SMART HUB IRP/ATAS */}

                    </main>
                </div>
            );
        };

       const App = () => {
            const [currentUser, setCurrentUser] = useState(() => {
                const saved = sessionStorage.getItem('lb-user');
                return saved ? JSON.parse(saved) : null;
            });
            const { toasts, dismiss } = useToast();
            
            const handleLogin = (userObj) => { 
                sessionStorage.setItem('lb-user', JSON.stringify(userObj)); 
                setCurrentUser(userObj); 
            };
            const handleLogout = () => { 
                sessionStorage.removeItem('lb-user'); 
                setCurrentUser(null); 
            };

            const [bgConfig, setBgConfig] = useState(() => {
                const saved = localStorage.getItem('licitahub-bg');
                return saved ? JSON.parse(saved) : { url: '', opacity: 0.15 };
            });

            useEffect(() => {
                try {
                    localStorage.setItem('licitahub-bg', JSON.stringify(bgConfig));
                } catch (e) {}
            }, [bgConfig]);

            return (
                <div className={`flex-1 flex flex-col h-full w-full relative min-h-screen transition-colors duration-300 ${bgConfig.url ? 'bg-transparent' : 'bg-slate-50 dark:bg-slate-950'}`}>
                    {bgConfig.url && (
                        <div 
                            className="fixed inset-0 z-0 bg-cover bg-center bg-no-repeat pointer-events-none transition-opacity duration-500"
                            style={{ backgroundImage: `url("${bgConfig.url}")`, opacity: bgConfig.opacity }}
                        />
                    )}
                    
                    <div className="flex-1 flex flex-col relative z-10 w-full h-full">
                      {currentUser ? <Dashboard onLogout={handleLogout} bgConfig={bgConfig} setBgConfig={setBgConfig} currentUser={currentUser} /> : <Login onLogin={handleLogin} />}
                        
                        <div className="fixed bottom-0 right-0 p-4 sm:p-6 z-[9999] flex flex-col items-end pointer-events-none">
                          {toasts.map((t) => (
                                <div key={t.id} className={`pointer-events-auto transform transition-all duration-300 mb-3 ${t.open ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}>
                                    <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-2xl p-4 min-w-[300px] flex items-start gap-3 relative overflow-hidden">
                                        <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${t.variant === 'destructive' ? 'bg-red-500' : t.variant === 'success' ? 'bg-green-500' : 'bg-indigo-500'}`} />
                                        <div className="mt-0.5">
                                            {t.variant === 'destructive' ? <Icon name="alert" className="h-5 w-5 text-red-500" /> : <Icon name="check" className="h-5 w-5 text-indigo-500" />}
                                        </div>
                                        <div className="flex-1">
                                            <h4 className="text-sm font-bold">{t.title}</h4>
                                            {t.description && <p className="text-xs text-slate-500 mt-0.5">{t.description}</p>}
                                        </div>
                                        <button onClick={() => dismiss(t.id)} className="text-slate-400 hover:text-slate-700 transition-colors"><Icon name="x" className="h-4 w-4" /></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
