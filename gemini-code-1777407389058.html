                    {icons[name]}

        const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const removeAccents = (str) => {
            if (!str) return '';
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        };

        const formatDate = (isoString) => {
            if (!isoString) return 'Não informada';
            try {
                const date = new Date(isoString);
                if (isNaN(date.getTime())) return 'Inválida';
                return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
            } catch { return 'Inválida'; }
        };

        const formatDateTime = (isoString) => {
            if (!isoString) return 'Não informada';
            try {
                const date = new Date(isoString);
                if (isNaN(date.getTime())) return 'Inválida';
                const formatted = date.toLocaleString('pt-BR', { 
                    timeZone: 'America/Sao_Paulo', 
                    day: '2-digit', month: '2-digit', year: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
                return `${formatted}`;
            } catch { return 'Inválida'; }
        };

        const getStatusColor = (status) => {
            if (!status) return 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300 border border-slate-200 dark:border-slate-700';
            const s = status.toLowerCase();
            if (s.includes('recebendo') || s.includes('aberta') || s.includes('vigente')) return 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 border border-green-200 dark:border-green-800';
            if (s.includes('homologad') || s.includes('encerrad') || s.includes('concluíd')) return 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300 border border-slate-200 dark:border-slate-700';
            if (s.includes('suspen') || s.includes('cancelad') || s.includes('revogad')) return 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 border border-red-200 dark:border-red-800';
            return 'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400 border border-blue-100 dark:border-blue-800';
        };

        const extrairValorReal = (item) => {
            if (!item) return 0;
            const v = item.valorTotalEstimado || item.valor_total_estimado || item.valorEstimado || 
                      item.valor_estimado || item.valor_global || item.valorGlobal || 
                      item.valor_contrato || item.valorContrato || item.valorTotal || 
                      item.valor_total || item.valor || 0;
                      
            if (typeof v === 'number') return v;
            if (typeof v === 'string') {
                let strVal = v.replace(/[^\d.,]/g, '');
                if (strVal.includes(',')) {
                    strVal = strVal.replace(/\./g, ''); 
                    strVal = strVal.replace(',', '.'); 
                }
                const num = parseFloat(strVal);
                return isNaN(num) ? 0 : num;
            }
            return 0;
        };

        const HighlightedText = ({ text, highlight, matchType }) => {
            if (!highlight || !text) return <span>{text}</span>;
            try {
                let regex;
                if (matchType === 'exact') {
                    regex = new RegExp(`(${escapeRegExp(highlight.trim())})`, 'gi');
                } else {
                    const words = highlight.trim().split(/\s+/).filter(Boolean);
                    const accentMap = {
                        'a': '[aáàãâäAÁÀÃÂÄ]', 'e': '[eéèêëEÉÈÊË]', 'i': '[iíìîïIÍÌÎÏ]',
                        'o': '[oóòõôöOÓÒÕÔÖ]', 'u': '[uúùûüUÚÙÛÜ]', 'c': '[cçCÇ]'
                    };
                    const regexParts = words.map(w => {
                        return w.split('').map(char => accentMap[char.toLowerCase()] || escapeRegExp(char)).join('');
                    });
                    regex = new RegExp(`(${regexParts.join('|')})`, 'gi');
                }
                const parts = text.split(regex);
                const testRegex = new RegExp(regex.source, 'i');
                return (
                    <span>
                        {parts.map((part, i) => 
                            testRegex.test(part) ? (
                                <mark key={i} className="bg-yellow-300/90 text-yellow-900 font-bold rounded-sm px-1 shadow-sm">
                                    {part}
                                </mark>
                            ) : (
                                <span key={i}>{part}</span>
                            )
                        )}
                    </span>
                );
            } catch (e) {
                return <span>{text}</span>;
            }
        };

        const ESTADOS_BR = [
            'AC', 'AL', 'AP', 'AM', 'BA', 'CE', 'DF', 'ES', 'GO', 'MA', 'MT', 'MS', 'MG', 
            'PA', 'PB', 'PR', 'PE', 'PI', 'RJ', 'RN', 'RS', 'RO', 'RR', 'SC', 'SP', 'SE', 'TO'
        ];
        const ESFERAS = ['Municipal', 'Estadual', 'Federal'];

        const getEsferaInfo = (nomeOrgao, esfera_nome) => {
            if (esfera_nome) return esfera_nome;
            const org = (nomeOrgao || '').toUpperCase();
            if (org.includes('PREFEITURA') || org.includes('MUNICÍPIO') || org.includes('MUNICIPIO') || org.includes('CÂMARA MUNICIPAL')) return 'Municipal';
            if (org.includes('ESTADO') || org.includes('TRIBUNAL DE JUSTIÇA') || org.includes('SECRETARIA DE ESTADO') || org.includes('POLÍCIA MILITAR')) return 'Estadual';
            if (org.includes('FEDERAL') || org.includes('MINISTÉRIO') || org.includes('UNIÃO') || org.includes('INSTITUTO FEDERAL')) return 'Federal';
            return 'Não informada';
        };

        const getCapagNote = (nomeOrgao) => {
            if (!nomeOrgao) return null;
            const upper = nomeOrgao.toUpperCase();
            if (upper.includes('PREFEITURA') || upper.includes('MUNICÍPIO') || upper.includes('MUNICIPIO')) {
                let hash = 0;
                for (let i = 0; i < upper.length; i++) hash += upper.charCodeAt(i);
                const scores = ['A', 'B', 'C', 'D'];
                return scores[hash % 4]; 
            }
            return null;
        };

        const getCapagColor = (note) => {
            switch(note) {
                case 'A': return 'bg-green-100 text-green-700 border-green-300 dark:bg-green-900/40 dark:text-green-400 dark:border-green-700';
                case 'B': return 'bg-blue-100 text-blue-700 border-blue-300 dark:bg-blue-900/40 dark:text-blue-400 dark:border-blue-700';
                case 'C': return 'bg-yellow-100 text-yellow-700 border-yellow-300 dark:bg-yellow-900/40 dark:text-yellow-400 dark:border-yellow-700';
                case 'D': return 'bg-red-100 text-red-700 border-red-300 dark:bg-red-900/40 dark:text-red-400 dark:border-red-700';
                default: return 'bg-slate-100 text-slate-700 border-slate-300';
            }
        };

        const extractPortalName = (item, defaultFallback = 'PNCP') => {
            let sys = item.usuario_nome || item.usuarioNome || item.nome_sistema || item.nomeSistema || '';
            const link = item.linkSistemaOrigem || item.item_url || '';
            
            if (!sys && link) {
                if (link.includes('compras.gov.br') || link.includes('comprasnet')) sys = 'Compras.gov.br';
                else if (link.includes('licitacoes-e')) sys = 'Licitações-e (BB)';
                else if (link.includes('portaldecompraspublicas')) sys = 'Portal de Compras Públicas';
                else if (link.includes('bec.sp.gov.br')) sys = 'BEC/SP';
                else if (link.includes('bll.org.br') || link.includes('bllcompras')) sys = 'BLL Compras';
                else if (link.includes('transparencia')) sys = 'Portal de Transparência';
            }
            
            sys = sys || item.fonte || defaultFallback;
            
            if (sys.toUpperCase().includes('COMPRASNET') || sys.toUpperCase().includes('COMPRAS.GOV')) return 'Compras.gov.br';
            if (sys.toUpperCase().includes('PORTAL DE COMPRAS PÚBLICAS')) return 'Portal de Compras Públicas';
            
            return sys;
        };

        let countId = 0;
        const genId = () => (countId = (countId + 1) % Number.MAX_SAFE_INTEGER).toString();
        const toastTimeouts = new Map();

        const addToRemoveQueue = (toastId, dispatch) => {
            if (toastTimeouts.has(toastId)) return;
            const timeout = setTimeout(() => {
                toastTimeouts.delete(toastId);
                dispatch({ type: "REMOVE_TOAST", toastId });
            }, 5000);
            toastTimeouts.set(toastId, timeout);
        };

        const reducer = (state, action, dispatch) => {
            switch (action.type) {
                case "ADD_TOAST": return { ...state, toasts: [action.toast, ...state.toasts].slice(0, 5) };
                case "DISMISS_TOAST":
                    if (action.toastId) addToRemoveQueue(action.toastId, dispatch);
                    else state.toasts.forEach((t) => addToRemoveQueue(t.id, dispatch));
                    return { ...state, toasts: state.toasts.map((t) => t.id === action.toastId || !action.toastId ? { ...t, open: false } : t) };
                case "REMOVE_TOAST": return { ...state, toasts: action.toastId ? state.toasts.filter((t) => t.id !== action.toastId) : [] };
                default: return state;
            }
        };

        let memoryState = { toasts: [] };
        const listeners = [];
        const dispatch = (action) => {
            memoryState = reducer(memoryState, action, dispatch);
            listeners.forEach((l) => l(memoryState));
        };

        const toast = (props) => {
            const id = genId();
            const dismiss = () => dispatch({ type: "DISMISS_TOAST", toastId: id });
            dispatch({ type: "ADD_TOAST", toast: { ...props, id, open: true } });
            return { id, dismiss };
        };

        const useToast = () => {
            const [state, setState] = useState(memoryState);
            useEffect(() => {
                listeners.push(setState);
                return () => { const i = listeners.indexOf(setState); if (i > -1) listeners.splice(i, 1); };
            }, []);
            return { ...state, toast, dismiss: (id) => dispatch({ type: "DISMISS_TOAST", toastId: id }) };
        };

        const fetchApiSecure = async (url) => {
            try {
                const res = await fetch(url, { headers: { 'Accept': 'application/json' }});
                if (res.ok) return res;
            } catch(e) {}

            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const res = await fetch(proxyUrl);
                if (res.ok) {
                    const data = await res.json();
                    if (data.contents) {
                        return {
                            ok: true,
                            json: async () => JSON.parse(data.contents)
                        };
                    }
                }
            } catch(e) {}

            throw new Error("Falha na rede ou bloqueio de CORS.");
        };

        async function searchPNCPFallback(keyword, pagina, vigentes) {
            try {
                const today = new Date();
                const past = new Date(today); past.setMonth(past.getMonth() - 3);
                const fmt = (d) => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;

                const modalidades = [1, 2, 3, 4, 5, 6, 7, 8]; 
                const fetches = modalidades.map(async (mod) => {
                    try {
                        const url = `https://pncp.gov.br/api/consulta/v1/contratacoes/publicacao?dataInicial=${fmt(past)}&dataFinal=${fmt(today)}&codigoModalidadeContratacao=${mod}&pagina=${pagina}&tamanhoPagina=50`;
                        const resp = await fetchApiSecure(url);
                        if (!resp || !resp.ok) return [];
                        const json = await resp.json();
                        return (json.data || []);
                    } catch (erro) {
                        return [];
                    }
                });

                const results = await Promise.all(fetches);
                const items = results.flat().map((item, i) => {
                    const sys = extractPortalName(item);

                    const num = item.numeroCompra || item.numeroControlePNCP?.split('-')[2]?.split('/')[0] || '';
                    const ano = item.anoCompra || item.numeroControlePNCP?.split('/')[1] || '';
                    const tituloBusca = num && ano ? `Edital nº ${String(num).padStart(3, '0')}/${ano}` : 'Edital / Contratação';
                    const idContratacao = item.numero_controle_pncp || item.numeroControlePNCP || '';
                    
                    const fallbackId = item.orgaoEntidade?.cnpj ? `${item.orgaoEntidade.cnpj}-${ano}-${num}` : i;

                    const valor = extrairValorReal(item);

                    return {
                        id: `pncp-${idContratacao || fallbackId}`,
                        tituloBusca: tituloBusca,
                        idContratacaoPncp: idContratacao,
                        objetoCompra: item.objetoCompra || 'Sem título',
                        orgaoEntidade: { razaoSocial: item.orgaoEntidade?.razaoSocial || '' },
                        dataPublicacao: formatDate(item.dataPublicacaoPncp),
                        dataIncioRecebimento: formatDateTime(item.dataAberturaProposta || item.dataInicioVigencia),
                        dataFimRecebimento: formatDateTime(item.dataEncerramentoProposta || item.dataFimVigencia),
                        rawDate: item.dataAberturaProposta || item.dataInicioVigencia || item.dataPublicacaoPncp || '1970-01-01',
                        rawPublicacaoDate: item.dataPublicacaoPncp || '1970-01-01',
                        modalidadeNome: item.modalidadeNome || 'Pregão',
                        situacao: item.situacaoCompraNome || 'Publicado',
                        valorTotalEstimado: valor,
                        fonte: 'PNCP',
                        sistema: sys,
                        linkSistemaOrigem: item.linkSistemaOrigem || (item.orgaoEntidade?.cnpj && item.anoCompra && item.sequencialCompra
                            ? `https://pncp.gov.br/app/editais/${item.orgaoEntidade.cnpj}/${item.anoCompra}/${item.sequencialCompra}` : ''),
                        uf: item.unidadeOrgao?.ufSigla || item.uf || '',
                        esfera: getEsferaInfo(item.orgaoEntidade?.razaoSocial, item.esferaNome)
                    };
                });
                return { items, total: items.length };
            } catch (e) { return { items: [], total: 0 }; }
        }

        async function searchPNCP(keyword, pagina, vigentes, searchType = 'edital') {
            try {
                const tipoDoc = searchType === 'ata' ? 'ata' : 'edital';
                const params = new URLSearchParams({ q: keyword, tipos_documento: tipoDoc, pagina: String(pagina), tam_pagina: '50' });
                if (vigentes && searchType !== 'ata') params.set('status', 'recebendo_proposta');
                const url = `https://pncp.gov.br/api/search/?${params}`;
                
                const resp = await fetchApiSecure(url);
                if (!resp || !resp.ok) throw new Error('PNCP falhou');
                
                const json = await resp.json();
                const items = (json.items || []).map(item => {
                    const cnpj = item.orgao_cnpj || item.cnpj || '';
                    const ano = item.ano || item.ano_compra || '';
                    const seq = item.numero_sequencial || item.sequencial_compra || '';
                    let link = (cnpj && ano && seq) ? `https://pncp.gov.br/app/editais/${cnpj}/${ano}/${seq}` : '';
                    
                    const sys = extractPortalName({ ...item, linkSistemaOrigem: link });

                    const uf = item.unidade_orgao?.uf || item.unidade_orgao_uf || item.uf_sigla || item.uf || '';
                    const esfera = getEsferaInfo(item.orgao_nome, item.esfera_nome);

                    const numC = item.numero_compra || item.numero_sequencial || '';
                    const anoC = item.ano_compra || item.ano || '';
                    const tituloBusca = numC && anoC ? `${searchType === 'ata' ? 'Ata SRP' : 'Edital'} nº ${String(numC).padStart(3, '0')}/${anoC}` : `${searchType === 'ata' ? 'Ata de Registro de Preço' : 'Edital / Contratação'}`;
                    const idContratacao = item.numero_controle_pncp || item.numeroControlePNCP || '';

                    const valor = extrairValorReal(item);

                    return {
                        id: `pncp-${idContratacao || cnpj + '-' + ano + '-' + seq}`,
                        tituloBusca: tituloBusca,
                        idContratacaoPncp: idContratacao,
                        objetoCompra: item.description || item.title || 'Sem título',
                        orgaoEntidade: { razaoSocial: item.orgao_nome || '' },
                        dataPublicacao: formatDate(item.data_publicacao_pncp),
                        dataIncioRecebimento: formatDateTime(item.data_inicio_vigencia || item.data_abertura_proposta),
                        dataFimRecebimento: formatDateTime(item.data_fim_vigencia || item.data_encerramento_proposta),
                        rawDate: item.data_inicio_vigencia || item.data_publicacao_pncp || '1970-01-01',
                        rawPublicacaoDate: item.data_publicacao_pncp || '1970-01-01',
                        modalidadeNome: item.modalidade_licitacao_nome || 'Pregão',
                        situacao: item.situacao_nome || (vigentes ? 'Recebendo Proposta' : 'Publicado'),
                        valorTotalEstimado: valor,
                        linkSistemaOrigem: link,
                        fonte: 'PNCP',
                        sistema: sys,
                        uf: uf,
                        esfera: esfera
                    };
                });
                return { items, total: json.count || items.length };
            } catch (e) {
                return await searchPNCPFallback(keyword, pagina, vigentes);
            }
        }

        async function searchComprasGov(keyword, vigentes) {
            try {
                const url = `https://dadosabertos.compras.gov.br/modulo-legado/1_consultarLicitacao?pagina=1&tamanhoPagina=50&objetoLicitacao=${encodeURIComponent(keyword)}`;
                const resp = await fetchApiSecure(url);
                if (!resp || !resp.ok) throw new Error('Falha ComprasNet');
                
                const json = await resp.json();
                
                let records = json.resultado || [];
                if (vigentes) {
                    records = records.filter(i => {
                        const sit = (i.situacaoLicitacao || '').toLowerCase();
                        return sit.includes('aberta') || sit.includes('recebendo');
                    });
                }

                return records.map(item => {
                    let numStr = String(item.numero || '');
                    if(numStr.length >= 5 && !numStr.includes('/')) {
                        numStr = `${numStr.slice(0, -4)}/${numStr.slice(-4)}`;
                    }
                    const tituloBusca = numStr ? `Edital nº ${numStr}` : 'Edital / Contratação';
                    const valor = item.valorEstimado || item.valorTotal || 0;

                    return {
                        id: `comprasgov-${item.codigoUASG}-${item.numero}-${item.codigoModalidade || '0'}`,
                        tituloBusca: tituloBusca,
                        idContratacaoPncp: '', 
                        objetoCompra: item.objetoLicitacao || 'Sem título',
                        orgaoEntidade: { razaoSocial: item.nomeOrgao || 'Compras.gov.br' },
                        dataPublicacao: formatDate(item.dataPublicacao),
                        dataIncioRecebimento: formatDateTime(item.dataAbertura),
                        dataFimRecebimento: formatDateTime(item.dataEntregaProposta || item.dataEncerramento),
                        rawDate: item.dataAbertura || item.dataPublicacao || '1970-01-01',
                        rawPublicacaoDate: item.dataPublicacao || '1970-01-01',
                        modalidadeNome: item.modalidadeLicitacao || 'ComprasNet',
                        situacao: item.situacaoLicitacao || 'Publicado',
                        valorTotalEstimado: valor,
                        linkSistemaOrigem: `https://www.gov.br/compras/pt-br`,
                        fonte: 'COMPRASNET',
                        sistema: 'Compras.gov.br',
                        uf: item.uf || item.uf_sigla || '',
                        esfera: 'Federal' 
                    };
                });
            } catch (e) { return []; } 
        }

        async function searchContracts(keyword, pagina, vigentes) {

                const url = `https://pncp.gov.br/api/search/?q=${encodeURIComponent(keyword)}&tipos_documento=contrato&pagina=${pagina}&tam_pagina=50`;
                const resp = await fetchApiSecure(url);

                return (json.items || []).map(item => {

                    const sys = extractPortalName({ ...item, linkSistemaOrigem: link });

                        orgaoEntidade: { razaoSocial: item.orgao_nome || '' },

                        dataIncioRecebimento: formatDateTime(item.data_inicio_vigencia),

                    };
                });

                console.error('Erro searchContracts:', e);
                return [];
            }
        }

        const runFullSearchAndFilter = async (keyword, pagina, filters, archivedDict = {}) => {
            let apiKeyword = keyword;
            if (filters.matchType !== 'exact') {
                apiKeyword = keyword.trim().split(/\s+/)[0];
            }

            let allItems = [];
            
            if (filters.searchType === 'contrato') {
                const contratos = await searchContracts(apiKeyword, pagina, filters.vigentes);
                allItems = contratos;
            } 
            else if (filters.searchType === 'ata') {
                const atas = await searchPNCP(apiKeyword, pagina, filters.vigentes, 'ata');
                allItems = atas.items;
            }
            else { 
                const promises = [searchPNCP(apiKeyword, pagina, filters.vigentes, 'edital')];
                if (filters.searchType !== 'ata') {
                    promises.push(searchComprasGov(apiKeyword, filters.vigentes));
                }
                const results = await Promise.allSettled(promises);
                results.forEach(res => {
                    if (res.status === 'fulfilled' && res.value) {
                        if (Array.isArray(res.value)) allItems.push(...res.value);
                        else if (res.value.items) allItems.push(...res.value.items);
                    }
                });
            }

            const seenIds = new Set();
            const searchKwNoAccents = removeAccents(keyword.toLowerCase()).split(/\s+/).filter(Boolean);
            const regexExact = new RegExp('\\b' + escapeRegExp(keyword) + '\\b', 'i');

            allItems = allItems.filter(item => {
                if (archivedDict[item.id]) return false;
                if (seenIds.has(item.id)) return false;
                seenIds.add(item.id);

                const text = `${item.objetoCompra} ${item.orgaoEntidade?.razaoSocial}`;
                
                if (filters.matchType === 'exact') {
                    if (!regexExact.test(text)) return false;
                } else {
                    const textNormalized = removeAccents(text.toLowerCase());
                    if (!searchKwNoAccents.every(w => textNormalized.includes(w))) return false;
                }

                if (filters.uf && filters.uf.length > 0) {
                    if (!filters.uf.includes(item.uf)) return false;
                }
                
                if (filters.esfera && Array.isArray(filters.esfera) && filters.esfera.length > 0) {
                    if (!filters.esfera.includes(item.esfera)) return false;
                }

                if (filters.negative) {
                    const negWords = removeAccents(filters.negative.toLowerCase()).split(',').map(w => w.trim()).filter(Boolean);
                    const searchStr = removeAccents(text.toLowerCase());
                    if (negWords.some(nw => searchStr.includes(nw))) return false;
                }

                if (filters.orgao) {
                    const orgWord = removeAccents(filters.orgao.toLowerCase()).trim();
                    const orgaoText = removeAccents((item.orgaoEntidade?.razaoSocial || '').toLowerCase());
                    if (!orgaoText.includes(orgWord)) return false;
                }
                return true;
            });

            if (filters.dateStart || filters.dateEnd) {
                const tsIni = filters.dateStart ? new Date(`${filters.dateStart}T00:00:00`).getTime() : 0;
                const tsFim = filters.dateEnd ? new Date(`${filters.dateEnd}T23:59:59`).getTime() : Infinity;
                
                allItems = allItems.filter(item => {
                    const itemTs = new Date(item.rawPublicacaoDate).getTime();
                    if (isNaN(itemTs)) return true; 
                    return itemTs >= tsIni && itemTs <= tsFim;
                });
            }

            allItems.sort((a, b) => new Date(b.rawDate).getTime() - new Date(a.rawDate).getTime());

            return { items: allItems, total: allItems.length };
        };

        const DynamicValueDisplay = ({ item }) => {
            const [valor, setValor] = useState(Number(item.valorTotalEstimado) || 0);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                if (valor > 0 || !item.idContratacaoPncp) return;

                let isMounted = true;
                const fetchMissingValue = async () => {
                    setLoading(true);
                    try {
                        const parts = item.idContratacaoPncp.match(/^(\d{14})-[^-]+-(\d+)\/(\d{4})$/);
                        if (!parts) return;
                        
                        const cnpj = parts[1];
                        const seq = parseInt(parts[2], 10);
                        const ano = parts[3];

                        const baseUrl = `https://pncp.gov.br/api/pncp/v1/orgaos/${cnpj}/compras/${ano}/${seq}`;
                        let finalValue = 0;

                        const fetchUrl = async (url) => {
                            let res = await fetch(url, { headers: { 'Accept': 'application/json' }}).catch(() => null);
                            if (!res || !res.ok) {
                                res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`).catch(() => null);
                                if (res && res.ok) {
                                    const data = await res.json();
                                    return JSON.parse(data.contents);
                                }
                                return null;
                            }
                            return await res.json();
                        };

                        const mainData = await fetchUrl(baseUrl);
                        if (mainData && mainData.valorTotalEstimado > 0) {
                            finalValue = mainData.valorTotalEstimado;
                        }

                        if (finalValue === 0) {
                            const itemsData = await fetchUrl(`${baseUrl}/itens`);
                            const list = Array.isArray(itemsData) ? itemsData : (itemsData?.data || []);
                            
                            if (list.length > 0) {
                                finalValue = list.reduce((acc, cur) => {
                                    const valItem = Number(cur.valorTotalEstimado) || (Number(cur.quantidade) * Number(cur.valorUnitarioEstimado)) || 0;
                                    return acc + valItem;
                                }, 0);
                            }
                        }

                        if (isMounted && finalValue > 0) {
                            setValor(finalValue);
                        }
                    } catch (e) {
                    } finally {
                        if (isMounted) setLoading(false);
                    }
                };
                
                fetchMissingValue();
                return () => { isMounted = false; };
            }, [item.idContratacaoPncp, valor]);

            if (loading) {
                return <span className="text-xs font-bold text-indigo-400 animate-pulse flex items-center gap-1"><Icon name="database" className="w-3.5 h-3.5" /> Somando itens...</span>;
            }

            return (
                <span className={`font-black text-lg ${valor > 0 ? 'text-slate-900 dark:text-white' : 'text-slate-400 dark:text-slate-500'}`}>
                    {valor > 0 ? `R$ ${valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}` : 'Valor não informado'}
                </span>
            );
        };

        const GerenciadorAnexos = ({ item }) => {

                setLoading(true);
                try {
                    const parts = item.idContratacaoPncp.match(/^(\d{14})-[^-]+-(\d+)\/(\d{4})$/);
                    if (!parts) return;
                    
                    const cnpj = parts[1];
                    const seq = parseInt(parts[2], 10);
                    const ano = parts[3];

                    let res = await fetch(url, { headers: { 'Accept': 'application/json' }}).catch(() => null);

                        if (res && res.ok) {

        const analisarRiscoEdital = (texto, valor) => {
            if (!texto) return { score: 10, nivel: 'Desconhecido', color: 'bg-slate-200', badges: [] };
            
            let score = 30;
            const badges = [];
            const str = texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

            const regras = [
                { regex: /\b(amostra|prova de conceito|poc)\b/g, peso: 25, badge: '⚠️ Exige Amostra', cor: 'bg-orange-100 text-orange-800 border-orange-300' },
                { regex: /\b(registro de precos|srp)\b/g, peso: 15, badge: 'Ata (SRP)', cor: 'bg-blue-100 text-blue-800 border-blue-300' },
                { regex: /\b(continuo|demanda continuada)\b/g, peso: 10, badge: 'Contrato Contínuo', cor: 'bg-emerald-100 text-emerald-800 border-emerald-300' },
                { regex: /\b(exclusivo me\/?epp|microempresa)\b/g, peso: -20, badge: '🎯 Exclusivo ME/EPP', cor: 'bg-green-100 text-green-800 border-green-300' },
                { regex: /\b(emergencial|urgencia|calamidade)\b/g, peso: 30, badge: '🚨 Urgência', cor: 'bg-red-100 text-red-800 border-red-300' },
                { regex: /\b(engenharia|obra|reforma)\b/g, peso: 35, badge: 'Engenharia/Obra', cor: 'bg-stone-200 text-stone-800 border-stone-400' },
                { regex: /\b(software|nuvem|sistema|tecnologia)\b/g, peso: 10, badge: 'Tecnologia (TI)', cor: 'bg-purple-100 text-purple-800 border-purple-300' }
            ];

            regras.forEach(regra => {
                if (regra.regex.test(str)) {
                    score += regra.peso;
                    badges.push({ label: regra.badge, cor: regra.cor });
                }
            });

            const vNum = Number(valor) || 0;
            if (vNum > 1000000) score += 20; 
            if (vNum > 0 && vNum < 50000) score -= 15; 

            score = Math.max(0, Math.min(100, score));

            let nivel, color;
            if (score <= 40) { nivel = 'Baixa Complexidade'; color = 'bg-green-500'; }
            else if (score <= 70) { nivel = 'Média Complexidade'; color = 'bg-yellow-500'; }
            else { nivel = 'Alta Complexidade'; color = 'bg-red-500'; }

            return { score, nivel, color, badges };
        };

        const Login = ({ onLogin }) => {
            const [user, setUser] = useState('');
            const [pass, setPass] = useState('');
            const [show, setShow] = useState(false);
            const [err, setErr] = useState('');
            const [loading, setLoading] = useState(false);

            const handle = async (e) => {
                e.preventDefault();
                setLoading(true); setErr('');
                await new Promise(r => setTimeout(r, 600)); 
                
                let users = window.EMBEDDED_USERS || [];
                try {
                    const urlPlanilha = 'https://script.google.com/macros/s/AKfycbx2APhZN--fCq8vuYrkQM-zbYERNJHN2ajLvyvNvo04-NbcwexQTD-PSglIbMQpe4FWLw/exec';
                    const resp = await fetch(urlPlanilha);
                    const nuvemUsers = await resp.json();
                    const localData = JSON.parse(localStorage.getItem('licitahub-users') || '[]');
                    const combined = [...users, ...localData, ...nuvemUsers];
                    users = Array.from(new Map(combined.map(u => [u.username, u])).values());
                } catch(e) { 
                    console.log("Nuvem inacessível no momento, usando cache local."); 
                }

                const foundUser = users.find(u => u.username.toLowerCase() === user.trim().toLowerCase() && u.password === pass.trim());

                if (foundUser) {
                    if (foundUser.role !== 'master' && foundUser.expirationDate) {
                        const today = new Date();
                        const dataLimpa = foundUser.expirationDate.split('T')[0];
                        const expDate = new Date(`${dataLimpa}T23:59:59`);
                        if (today > expDate) {
                            setErr('Sua licença de uso expirou. Contate o administrador.');
                            setLoading(false);
                            return;
                        }
                    }
                    onLogin(foundUser);
                } else {
                    setErr('Usuário ou senha incorretos.');
                }
                setLoading(false);
            };

            return (
                <div className="flex-1 flex items-center justify-center p-4 relative overflow-hidden z-10">
                    <div className="absolute inset-0 bg-gradient-to-br from-indigo-500/5 to-purple-500/10 z-0 pointer-events-none"></div>
                    <div className="absolute top-4 right-4 z-20"><ThemeToggle /></div>
                    
                    <div className="w-full max-w-md bg-white/95 dark:bg-slate-900/95 backdrop-blur-xl rounded-[2rem] shadow-2xl border border-white/20 dark:border-slate-800 p-10 z-10 relative">
                        <div className="flex flex-col items-center gap-4 mb-10">
                            <div className="h-16 w-16 rounded-2xl bg-indigo-600 flex items-center justify-center shadow-lg">
                                <Icon name="zap" className="h-8 w-8 text-white" />
                            </div>
                            <div className="text-center space-y-1">
                                <h1 className="text-2xl font-black tracking-tight text-slate-900 dark:text-white">LicitaHub</h1>
                                <p className="text-sm font-medium text-slate-500 mb-2">Central de Licitações Pro</p>
                                <p className="text-[10px] font-black uppercase tracking-widest text-indigo-500 bg-indigo-50 dark:bg-indigo-900/30 py-1 px-3 rounded-full inline-block border border-indigo-100 dark:border-indigo-800/50">
                                    DEV. André Philipe
                                </p>
                            </div>
                        </div>

                        <form onSubmit={handle} className="space-y-6">
                            <div className="space-y-2">
                                <label className="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Usuário</label>
                                <Input value={user} onChange={e => setUser(e.target.value)} placeholder="Digite seu usuário" autoFocus className="h-12 bg-white dark:bg-slate-950 shadow-sm" />
                            </div>
                            <div className="space-y-2">
                                <label className="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Senha</label>
                                <div className="relative">
                                    <Input type={show ? 'text' : 'password'} value={pass} onChange={e => setPass(e.target.value)} placeholder="Sua senha" className="h-12 pr-12 bg-white dark:bg-slate-950 shadow-sm" />
                                    <button type="button" onClick={() => setShow(!show)} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-500 transition-colors">
                                        <Icon name={show ? 'eyeOff' : 'eye'} />
                                    </button>
                                </div>
                            </div>
                            
                            {err && (
                                <div className="flex items-start gap-3 text-red-600 text-sm bg-red-50 dark:bg-red-900/20 p-4 rounded-xl border border-red-100 dark:border-red-900/50">
                                    <Icon name="alert" className="h-5 w-5 shrink-0 mt-0.5" /> <span className="font-medium leading-tight">{err}</span>
                                </div>
                            )}

                            <Button type="submit" className="w-full h-12 mt-4 text-base shadow-xl" disabled={loading}>
                                {loading ? <span className="animate-spin h-5 w-5 border-2 border-white/30 border-t-white rounded-full"></span> : <><Icon name="login" className="h-5 w-5" /> Entrar no Sistema</>}
                            </Button>
                        </form>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ onLogout, bgConfig, setBgConfig, currentUser }) => {
            const diasRestantes = React.useMemo(() => {
                if (!currentUser || currentUser.role === 'master' || !currentUser.expirationDate) return null;
                const dataLimpa = currentUser.expirationDate.split('T')[0];
                const diffTime = new Date(`${dataLimpa}T23:59:59`) - new Date();
                const dias = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                return isNaN(dias) ? 0 : dias;
            }, [currentUser]);

            const [showUserAdmin, setShowUserAdmin] = useState(false);
            const [newUsername, setNewUsername] = useState('');
            const [newPassword, setNewPassword] = useState('');
            const [newExpiration, setNewExpiration] = useState('');
            const [saving, setSaving] = useState(false);

            const [showSettings, setShowSettings] = useState(false);
            const [selectedItems, setSelectedItems] = useState(new Set());
            const [notifications, setNotifications] = useState([]);
            const [showNotifications, setShowNotifications] = useState(false);
            
            const [visibleCount, setVisibleCount] = useState(24);

            const { toast } = useToast();

            const getAllUsers = () => {
                const embedded = window.EMBEDDED_USERS || [];
                const local = JSON.parse(localStorage.getItem('licitahub-users') || '[]');
                const combined = [...embedded, ...local];
                return Array.from(new Map(combined.map(u => [u.username, u])).values());
            };

            const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbx2APhZN--fCq8vuYrkQM-zbYERNJHN2ajLvyvNvo04-NbcwexQTD-PSglIbMQpe4FWLw/exec';

            const saveToGoogleSheets = async (novoUser) => {
                setSaving(true);
                try {
                    await fetch(GOOGLE_SHEETS_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(novoUser)
                    });
                    toast({ title: '✅ Salvo na Nuvem!', description: `Usuário sincronizado na planilha.`, variant: 'success' });
                } catch (e) {
                    toast({ title: 'Erro na Nuvem', description: 'Usuário salvo localmente, mas falhou ao enviar para o Google.', variant: 'destructive' });
                } finally {
                    setSaving(false);
                }
            };

            const handleCreateUser = async (e) => {
                e.preventDefault();
                if (!newUsername || !newPassword || !newExpiration) return;

                const allUsers = getAllUsers();
                if (allUsers.some(u => u.username === newUsername.trim())) {
                    toast({ title: 'Usuário já existe!', description: 'Escolha outro nome de usuário.', variant: 'destructive' });
                    return;
                }

                const novoUser = { id: Date.now(), username: newUsername.trim(), password: newPassword.trim(), role: 'common', expirationDate: newExpiration };
                window.EMBEDDED_USERS = [...(window.EMBEDDED_USERS || []), novoUser];
                const localUsers = JSON.parse(localStorage.getItem('licitahub-users') || '[]');
                localStorage.setItem('licitahub-users', JSON.stringify([...localUsers, novoUser]));
                setNewUsername(''); setNewPassword(''); setNewExpiration('');
                await saveToGoogleSheets(novoUser);
            };

            const handleDeleteUser = async (username) => {
                if (!window.confirm(`Remover o usuário "${username}"?`)) return;
                window.EMBEDDED_USERS = (window.EMBEDDED_USERS || []).filter(u => u.username !== username);
                const local = JSON.parse(localStorage.getItem('licitahub-users') || '[]');
                localStorage.setItem('licitahub-users', JSON.stringify(local.filter(u => u.username !== username)));
                toast({ title: 'Usuário removido', description: 'Removido localmente. (Para remover da nuvem, apague a linha no Google Sheets)', variant: 'info' });
            };

            const [tabs, setTabs] = useState(() => {
                try {
                    const saved = localStorage.getItem('licitahub-tabs');
                    if (!saved) return [];
                    const parsed = JSON.parse(saved);
                    return parsed || [];
                } catch (erro) { return []; }
            });
            
            const [activeTab, setActiveTab] = useState(null); 
            const [keywordInput, setKeywordInput] = useState('');
            const [searchType, setSearchType] = useState('edital'); 
            const [showFilters, setShowFilters] = useState(false);
           
            const [filterMatchType, setFilterMatchType] = useState('approximate');
            const [filterVigentes, setFilterVigentes] = useState(false);
            const [filterUf, setFilterUf] = useState([]); 
            const [filterEsfera, setFilterEsfera] = useState([]);
            const [filterNegative, setFilterNegative] = useState('');
            const [filterOrgao, setFilterOrgao] = useState('');
            const [localSearch, setLocalSearch] = useState('');
            const [filterDateStart, setFilterDateStart] = useState('');
            const [filterDateEnd, setFilterDateEnd] = useState('');

            const [modalityFilter, setModalityFilter] = useState('Todas');
            const [statusFilter, setStatusFilter] = useState('Todas');

            const [favorites, setFavorites] = useState(() => {
                try {
                    const saved = localStorage.getItem('licitahub-favorites');
                    if (!saved) return {};
                    return JSON.parse(saved) || {};
                } catch (erro) { return {}; }
            });

            const [archived, setArchived] = useState(() => {
                try {
                    const saved = localStorage.getItem('licitahub-archived');
                    if (!saved) return {};
                    const parsed = JSON.parse(saved);
                    const dadosReais = {};
                    if (parsed) {
                        for (let key in parsed) {
                            if (typeof parsed[key] === 'object' && parsed[key] !== null) dadosReais[key] = parsed[key];
                        }
                    }
                    return dadosReais;
                } catch (erro) { return {}; }
            });

            const [isRadarActive, setIsRadarActive] = useState(false);
            const [radarIntervalMin, setRadarIntervalMin] = useState(5); 
            const tabsRef = useRef(tabs);
            const archivedRef = useRef(archived);
            const favoritesRef = useRef(favorites);

            useEffect(() => { setSelectedItems(new Set()); }, [activeTab]);

            useEffect(() => { setVisibleCount(24); }, [activeTab, modalityFilter, statusFilter, localSearch]);

            useEffect(() => {
                localStorage.setItem('licitahub-tabs', JSON.stringify(tabs));
                tabsRef.current = tabs; 
            }, [tabs]);

            useEffect(() => { 
                localStorage.setItem('licitahub-favorites', JSON.stringify(favorites)); 
                favoritesRef.current = favorites;
            }, [favorites]);

            useEffect(() => {
                localStorage.setItem('licitahub-archived', JSON.stringify(archived));
                archivedRef.current = archived; 
            }, [archived]);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1920; 
                        const MAX_HEIGHT = 1080;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        } else {
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        }
                        
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        
                        try {
                            localStorage.setItem('licitahub-bg', JSON.stringify({...bgConfig, url: dataUrl}));
                            setBgConfig({...bgConfig, url: dataUrl});
                            toast({ title: 'Imagem Salva', description: 'O plano de fundo foi atualizado com sucesso.', variant: 'success' });
                        } catch (err) {
                            toast({ title: 'Erro', description: 'A imagem continua a ser muito pesada para o navegador.', variant: 'destructive' });
                        }
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const [soundConfig, setSoundConfig] = useState(() => localStorage.getItem('licitahub-sound') || 'chime');
            useEffect(() => { localStorage.setItem('licitahub-sound', soundConfig); }, [soundConfig]);

            window.globalAudioCtx = window.globalAudioCtx || new (window.AudioContext || window.webkitAudioContext)();

            // MOTOR SINTETIZADOR DE ÁUDIO MULTI-SAMPLES
            const playAlertSound = (type = soundConfig) => {
                try {
                    if (window.globalAudioCtx.state === 'suspended') window.globalAudioCtx.resume();
                    const ctx = window.globalAudioCtx;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    
                    const now = ctx.currentTime;
                    
                    if (type === 'beep') {
                        osc.type = 'sine'; osc.frequency.setValueAtTime(880, now);
                        gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.5, now + 0.1); gain.gain.linearRampToValueAtTime(0, now + 0.5);
                        osc.start(now); osc.stop(now + 0.5);
                    } else if (type === 'chime') { // Campainha Suave (Estilo Loja)
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(523.25, now); // Nota Dó
                        osc.frequency.setValueAtTime(659.25, now + 0.2); // Nota Mi
                        gain.gain.setValueAtTime(0, now);
                        gain.gain.linearRampToValueAtTime(0.5, now + 0.05);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                        osc.start(now); osc.stop(now + 0.8);
                    } else if (type === 'sonar') { // Sonar de Submarino
                        osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now);
                        gain.gain.setValueAtTime(0, now);
                        gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
                        osc.start(now); osc.stop(now + 1.5);
                    } else if (type === 'urgent') { // Alerta Crítico Duplo
                        osc.type = 'square'; 
                        osc.frequency.setValueAtTime(400, now);
                        osc.frequency.setValueAtTime(600, now + 0.1);
                        osc.frequency.setValueAtTime(400, now + 0.2);
                        osc.frequency.setValueAtTime(600, now + 0.3);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.linearRampToValueAtTime(0, now + 0.4);
                        osc.start(now); osc.stop(now + 0.4);
                    }
                } catch (e) { }
            };

            const checkForUpdates = async (isManual = false) => {
                const currentTabs = tabsRef.current;
                if (currentTabs.length === 0) {
                    if (isManual) toast({ title: 'Aviso', description: 'Não há pesquisas ativas para atualizar.', variant: 'info' });
                    return;
                }

                if (isManual) toast({ title: 'Buscando atualizações...', description: 'Verificando todas as pesquisas abertas...', variant: 'info' });

                let totalNovos = 0;

                for (let tab of currentTabs) {
                    try {
                        const data = await runFullSearchAndFilter(tab.keyword, 1, tab.filters, archivedRef.current);
                        
                        setTabs(prevTabs => {
                            const targetTab = prevTabs.find(t => t.keyword === tab.keyword);
                            if (!targetTab) return prevTabs;

                            const existingIds = new Set(targetTab.items.map(i => i.id));
                            const newItems = data.items.filter(i => !existingIds.has(i.id) && !archivedRef.current[i.id] && !favoritesRef.current[i.id]);

                            if (newItems.length > 0) {
                                totalNovos += newItems.length;
                                if (!isManual) playAlertSound();

                                setNotifications(prev => [
                                    {
                                        id: Date.now().toString() + Math.random(),
                                        message: `${isManual ? 'Manual' : 'Radar'}: ${newItems.length} nova(s) licitação(ões) detectada(s) para "${tab.keyword}".`,
                                        unread: true,
                                        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                                    },
                                    ...prev
                                ]);

                                if (!isManual) toast({ title: '🎯 Radar: Nova Licitação!', description: `Encontramos ${newItems.length} edital(is) novo(s) para "${tab.keyword}".`, variant: 'success' });

                                const taggedNewItems = newItems.map(i => ({...i, isNewFromRadar: true}));
                                const existingItemsCleared = targetTab.items.map(i => ({...i, isNewFromRadar: false}));

                                return prevTabs.map(t => t.keyword === tab.keyword ? { ...t, items: [...taggedNewItems, ...existingItemsCleared], total: t.total + newItems.length } : t);
                            }
                            return prevTabs;
                        });
                    } catch (err) {}
                }

                if (isManual) {
                    if (totalNovos > 0) toast({ title: 'Atualização Concluída', description: `Encontramos ${totalNovos} novos editais!`, variant: 'success' });
                    else toast({ title: 'Tudo Atualizado', description: 'Nenhuma licitação nova encontrada nos portais.', variant: 'info' });
                }
            };

            useEffect(() => {
                if (!isRadarActive) return;
                const intervalMs = radarIntervalMin * 60000;
                const intervalId = setInterval(() => checkForUpdates(false), intervalMs);
                return () => clearInterval(intervalId);
            }, [isRadarActive, radarIntervalMin]);

            const isFavoritesView = activeTab === 'FAVORITOS';
            const isArchivedView = activeTab === 'ARQUIVADOS';
            const currentTabObj = tabs.find(t => t.keyword === activeTab);
            
            const baseItems = isFavoritesView ? Object.values(favorites) : 
                              isArchivedView ? Object.values(archived).filter(item => typeof item === 'object') : 
                              (currentTabObj?.items || []);
            
            const displayedItems = useMemo(() => {
                let items = baseItems;
                if (!isArchivedView) items = items.filter(item => !archived[item.id]);
                if (!isFavoritesView && !isArchivedView) items = items.filter(item => !favorites[item.id]);
                if (modalityFilter !== 'Todas') items = items.filter(i => i.modalidadeNome === modalityFilter);
                if (statusFilter !== 'Todas') items = items.filter(i => i.situacao === statusFilter);
                if (filterOrgao) {
                    const orgWord = removeAccents(filterOrgao.toLowerCase()).trim();
                    items = items.filter(i => removeAccents((i.orgaoEntidade?.razaoSocial || '').toLowerCase()).includes(orgWord));
                }
                if (isArchivedView && localSearch) {
                    const searchWord = removeAccents(localSearch.toLowerCase()).trim();
                    items = items.filter(i => 
                        removeAccents((i.objetoCompra || '').toLowerCase()).includes(searchWord) ||
                        removeAccents((i.orgaoEntidade?.razaoSocial || '').toLowerCase()).includes(searchWord) ||
                        removeAccents((i.tituloBusca || '').toLowerCase()).includes(searchWord)
                    );
                }
                return items;
            }, [baseItems, modalityFilter, statusFilter, archived, favorites, isFavoritesView, isArchivedView, filterOrgao, localSearch]);

            const uniqueModalities = useMemo(() => ['Todas', ...new Set(displayedItems.map(i => i.modalidadeNome).filter(Boolean))].sort(), [displayedItems]);
            const uniqueStatuses = useMemo(() => ['Todas', ...new Set(displayedItems.map(i => i.situacao).filter(Boolean))].sort(), [displayedItems]);
            
            const doSearch = async () => {
                const currentFilters = { 
                    matchType: filterMatchType, vigentes: filterVigentes, uf: filterUf,
                    esfera: filterEsfera, negative: filterNegative, orgao: filterOrgao, 
                    dateStart: filterDateStart, dateEnd: filterDateEnd, searchType: searchType 
                };
                let kw = keywordInput.trim();
                
                if (!kw && activeTab && activeTab !== 'FAVORITOS' && activeTab !== 'ARQUIVADOS') kw = activeTab;
                if (!kw && !filterOrgao) { toast({ title: 'Aviso', description: 'Insira uma palavra-chave ou o nome do Órgão nos filtros.', variant: 'info' }); return; }

                const tabKey = kw ? kw.toLowerCase() : `Órgão: ${filterOrgao}`;
                const apiSearchTerm = kw ? kw.toLowerCase() : filterOrgao;

                setKeywordInput(''); setActiveTab(tabKey); setModalityFilter('Todas'); setStatusFilter('Todas');

                setTabs(prev => {
                    const exists = prev.find(t => t.keyword === tabKey);
                    if (exists) return prev.map(t => t.keyword === tabKey ? { ...t, loading: true, filters: currentFilters } : t);
                    return [...prev, { keyword: tabKey, filters: currentFilters, items: [], total: 0, loading: true }];
                });

                try {
                    const data = await runFullSearchAndFilter(apiSearchTerm, 1, currentFilters, archivedRef.current);
                    const validItems = data.items;

                    setTabs(prev => prev.map(t => t.keyword === tabKey ? { ...t, items: validItems, total: validItems.length, loading: false } : t));
                    
                    if (validItems.length === 0) toast({ title: 'Aviso', description: 'Nenhum resultado encontrado para os filtros selecionados.', variant: 'info' });
                    else { playAlertSound(); toast({ title: 'Pesquisa Concluída', description: `Encontrados ${validItems.length} resultados.`, variant: 'success' }); }
                } catch (err) {
                    toast({ title: 'Falha de Conexão', description: 'Não foi possível conectar aos portais do Governo.', variant: 'destructive' });
                    setTabs(prev => prev.map(t => t.keyword === tabKey ? { ...t, loading: false } : t));
                }
            };

            const closeTab = (kw, e) => {
                e.stopPropagation();
                const newTabs = tabs.filter(t => t.keyword !== kw);
                if (activeTab === kw) setActiveTab(Object.keys(favorites).length > 0 ? 'FAVORITOS' : (newTabs.length > 0 ? newTabs[newTabs.length - 1].keyword : null));
                setTabs(newTabs);
            };

            const toggleSelect = (id) => setSelectedItems(prev => { const next = new Set(prev); if (next.has(id)) next.delete(id); else next.add(id); return next; });
            const allDisplayedSelected = displayedItems.length > 0 && displayedItems.every(i => selectedItems.has(i.id));
            const toggleSelectAll = () => {
                if (allDisplayedSelected) setSelectedItems(prev => { const next = new Set(prev); displayedItems.forEach(i => next.delete(i.id)); return next; });
                else setSelectedItems(prev => { const next = new Set(prev); displayedItems.forEach(i => next.add(i.id)); return next; });
            };

            const handleArchiveItem = (item) => {
                if (window.confirm("Deseja mesmo arquivar este edital? Ele não voltará a aparecer nas suas pesquisas.")) {
                    setArchived(prev => ({ ...prev, [item.id]: item }));
                    setFavorites(prev => { const newFavs = { ...prev }; delete newFavs[item.id]; return newFavs; });
                    setTabs(prev => prev.map(t => ({ ...t, items: t.items.filter(i => i.id !== item.id), total: t.items.filter(i => i.id !== item.id).length })));
                    toast({ title: 'Edital Arquivado', description: 'Edital removido e oculto com sucesso.', variant: 'success' });
                }
            };

            const handleArchiveSelected = () => {
                if (selectedItems.size === 0) return;
                if (window.confirm(`Tem a certeza que deseja arquivar definitivamente os ${selectedItems.size} editais selecionados?`)) {
                    const newArchived = { ...archived };
                    selectedItems.forEach(id => { const targetItem = displayedItems.find(i => i.id === id); if (targetItem) newArchived[id] = targetItem; });
                    setArchived(newArchived);
                    setFavorites(prev => { const newFavs = { ...prev }; selectedItems.forEach(id => delete newFavs[id]); return newFavs; });
                    setTabs(prev => prev.map(t => ({ ...t, items: t.items.filter(i => !selectedItems.has(i.id)), total: t.items.filter(i => !selectedItems.has(i.id)).length })));
                    toast({ title: 'Limpeza Concluída', description: `${selectedItems.size} resultados foram arquivados definitivamente.`, variant: 'success' });
                    setSelectedItems(new Set());
                }
            };

            const handleFavorite = (item) => {
                const isFav = !!favorites[item.id];
                if (!isFav) {

                                                                            </div>
                                                                            <span className="text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest shrink-0">
                                                                                {analise.nivel} ({analise.score}%)
                                                                            </span>
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })()}

                                                            <div className="bg-slate-50/80 dark:bg-slate-800/40 p-5 rounded-2xl mb-4 border border-slate-100 dark:border-slate-800/50 shadow-inner">
                                                                <h4 className="font-serif text-[15px] sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed text-justify">
                                                                    <HighlightedText text={item.objetoCompra} highlight={!isFavoritesView ? activeTab : (item.keywordOrigin || '')} matchType={!isFavoritesView ? (currentTabObj?.filters?.matchType || 'approximate') : 'approximate'} />
                                                                </h4>
                                                            </div>

                                                            <div className="flex items-center justify-between gap-2 mb-4">
                                                                <div className="text-xs font-bold text-slate-500 flex items-center flex-wrap gap-2">
                                                                    {item.uf && (
                                                                        <span className="text-[10px] font-bold px-2 py-0.5 bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400 uppercase tracking-widest rounded border border-emerald-100 dark:border-emerald-800/50 flex items-center gap-1"><Icon name="mapPin" className="h-3 w-3" /> {item.uf}</span>
                                                                    )}
                                                                    {item.esfera && (
                                                                        <span className="text-[10px] font-bold px-2 py-0.5 bg-purple-50 dark:bg-purple-900/20 text-purple-700 dark:text-purple-400 uppercase tracking-widest rounded border border-purple-100 dark:border-purple-800/50 flex items-center gap-1"><Icon name="building" className="h-3 w-3" /> {item.esfera}</span>
                                                                    )}
                                                                    <span className="flex items-center gap-1"><Icon name="database" className="h-3 w-3 shrink-0" /> {item.orgaoEntidade?.razaoSocial}</span>
                                                                </div>
                                                                {capagNote && (
                                                                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded border flex items-center gap-1 shrink-0 ml-auto ${getCapagColor(capagNote)}`}><Icon name="shield" className="h-3 w-3" /> CAPAG {capagNote}</span>
                                                                )}
                                                            </div>

                                                            <div className="flex flex-col gap-2 mb-4 bg-white dark:bg-slate-900 p-3 rounded-xl border border-slate-200 dark:border-slate-700">
                                                                <div className="flex flex-col text-[11px]">
                                                                    <span className="flex items-center gap-1.5 font-bold text-slate-400 uppercase tracking-wider mb-0.5"><Icon name="calendar" className="h-3.5 w-3.5"/> Publicado em:</span>
                                                                    <span className="font-bold text-slate-700 dark:text-slate-300 ml-5">{item.dataPublicacao}</span>
                                                                </div>
                                                                <div className="flex flex-col text-[11px]">
                                                                    <span className="flex items-center gap-1.5 font-bold text-slate-400 uppercase tracking-wider mb-0.5"><Icon name="clock" className="h-3.5 w-3.5"/> Data início de propostas:</span>
                                                                    <span className="font-bold text-indigo-600 dark:text-indigo-400 ml-5">{item.dataIncioRecebimento}</span>
                                                                </div>
                                                                <div className="flex flex-col text-[11px]">
                                                                    <span className="flex items-center gap-1.5 font-bold text-slate-400 uppercase tracking-wider mb-0.5"><Icon name="clock" className="h-3.5 w-3.5"/> Data fim de propostas:</span>
                                                                    <span className="font-bold text-orange-600 dark:text-orange-400 ml-5">{item.dataFimRecebimento}</span>
                                                                </div>
                                                            </div>
                                                            
                                                            <div className="flex items-center justify-between gap-3 mb-2 flex-wrap text-xs font-medium text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-slate-800/30 p-2 rounded-lg border border-slate-100 dark:border-slate-800">
                                                                {item.idContratacaoPncp ? (
                                                                    <span><strong>Id contratação PNCP:</strong> {item.idContratacaoPncp}</span>
                                                                ) : (
                                                                    <span><strong>Contratação Externa</strong></span>
                                                                )}
                                                                <span className="text-[10px] font-bold px-2 py-1 bg-blue-600 text-white uppercase tracking-widest rounded shadow-sm shrink-0">
                                                                    Fonte: {item.sistema}
                                                                </span>
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="pt-4 border-t border-slate-100 dark:border-slate-800 flex flex-col mt-auto">
                                                            <div className="flex justify-between items-center">
                                                                <DynamicValueDisplay item={item} />
                                                                {item.linkSistemaOrigem && (
                                                                    <a href={item.linkSistemaOrigem} target="_blank" rel="noopener noreferrer" className="text-[11px] font-bold bg-indigo-600 text-white px-4 py-2.5 rounded-xl hover:bg-indigo-700 transition-colors shadow-sm">
                                                                        Aceder ao Edital
                                                                    </a>
                                                                )}
                                                            </div>
                                                            <GerenciadorAnexos item={item} />
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        {visibleCount < displayedItems.length && (
                                            <div className="flex justify-center mt-10 mb-4 col-span-full">
                                                <Button 
                                                    variant="outline" 
                                                    onClick={() => setVisibleCount(prev => prev + 24)}
                                                    className="h-12 px-8 border-indigo-200 text-indigo-700 hover:bg-indigo-50 dark:border-indigo-800/50 dark:text-indigo-400 dark:hover:bg-indigo-900/30 rounded-full shadow-md transition-all"
                                                >
                                                    <Icon name="refresh" className="w-4 h-4 mr-2" />
                                                    Mostrar mais editais ({displayedItems.length - visibleCount} restantes)
                                                </Button>
                                            </div>
                                        )}
                                    </>
                                )}
                           </div>
                        )}
                    </div>
                        </div>
                    </main>
                </div>
            );
        };

        const App = () => {
            const [currentUser, setCurrentUser] = useState(() => {
                const saved = sessionStorage.getItem('lb-user');
                return saved ? JSON.parse(saved) : null;
            });
            const { toasts, dismiss } = useToast();
            
            const handleLogin = (userObj) => { sessionStorage.setItem('lb-user', JSON.stringify(userObj)); setCurrentUser(userObj); };
            const handleLogout = () => { sessionStorage.removeItem('lb-user'); setCurrentUser(null); };

            const [bgConfig, setBgConfig] = useState(() => {
                const saved = localStorage.getItem('licitahub-bg');
                return saved ? JSON.parse(saved) : { url: '', opacity: 0.15 };
            });

            useEffect(() => {
                try { localStorage.setItem('licitahub-bg', JSON.stringify(bgConfig)); } catch (e) {}
            }, [bgConfig]);

            return (
                <div className={`flex-1 flex flex-col h-full w-full relative min-h-screen transition-colors duration-300 ${bgConfig.url ? 'bg-transparent' : 'bg-slate-50 dark:bg-slate-950'}`}>
                    {bgConfig.url && <div className="fixed inset-0 z-0 bg-cover bg-center bg-no-repeat pointer-events-none transition-opacity duration-500" style={{ backgroundImage: `url("${bgConfig.url}")`, opacity: bgConfig.opacity }} />}
                    
                    <div className="flex-1 flex flex-col relative z-10 w-full h-full">
                        {currentUser ? <Dashboard onLogout={handleLogout} bgConfig={bgConfig} setBgConfig={setBgConfig} currentUser={currentUser} /> : <Login onLogin={handleLogin} />}
                        
                        <div className="fixed bottom-0 right-0 p-4 sm:p-6 z-[9999] flex flex-col items-end pointer-events-none">
                            {toasts.map((t) => (
                                <div key={t.id} className={`pointer-events-auto transform transition-all duration-300 mb-3 ${t.open ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}>
                                    <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-2xl p-4 min-w-[300px] flex items-start gap-3 relative overflow-hidden">
                                        <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${t.variant === 'destructive' ? 'bg-red-500' : t.variant === 'success' ? 'bg-green-500' : 'bg-indigo-500'}`} />
                                        <div className="mt-0.5">{t.variant === 'destructive' ? <Icon name="alert" className="h-5 w-5 text-red-500" /> : <Icon name="check" className="h-5 w-5 text-indigo-500" />}</div>
                                        <div className="flex-1"><h4 className="text-sm font-bold">{t.title}</h4>{t.description && <p className="text-xs text-slate-500 mt-0.5">{t.description}</p>}</div>
                                        <button onClick={() => dismiss(t.id)} className="text-slate-400 hover:text-slate-700 transition-colors"><Icon name="x" className="h-4 w-4" /></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
