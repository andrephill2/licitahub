    try { return JSON.parse(localStorage.getItem('lh-cal-notes') || '{}'); } catch { return {}; }
  });

    try { return JSON.parse(localStorage.getItem('lh-cal-gono') || '{}'); } catch { return {}; }
  });
  const [customEvents, setCustomEvents] = useState(() => {
    try { return JSON.parse(localStorage.getItem('lh-cal-custom') || '{}'); } catch { return {}; }
  });
  const [weekOffset, setWeekOffset] = useState(0);
  const [selected, setSelected] = useState(null);
  const [editingNote, setEditingNote] = useState('');

  const [customInput, setCustomInput] = useState('');

  useEffect(() => {
    const sync = () => {
      try { setFavorites(JSON.parse(localStorage.getItem('licitahub-favorites') || '{}')); } catch {}

  };

  const addCustomEvent = (dateKey, text) => {

    setCustomEvents(n);
    localStorage.setItem('lh-cal-custom', JSON.stringify(n));
  };
